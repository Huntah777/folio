<style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ── utils ── */
const uid = () => Math.random().toString(36).slice(2,9);
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const fmtKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayKey = () => fmtKey(new Date());
const parseKey = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };

/* ── security ── */
const MAX_IMAGE_BYTES = 2 * 1024 * 1024; /* 2 MB per uploaded image */
const safeHttpUrl = url => {
  if (!url || typeof url !== 'string') return null;
  try {
    const u = new URL(url.trim());
    if (u.protocol !== 'http:' && u.protocol !== 'https:') return null;
    return u.href;
  } catch { return null; }
};
const safeImageSrc = src => {
  if (!src || typeof src !== 'string') return null;
  const s = src.trim();
  if (/^data:image\/(png|jpe?g|gif|webp|svg\+xml);base64,/i.test(s)) return s;
  return safeHttpUrl(s);
};

/* ── markdown renderer ── */
function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function inlineMd(raw) {
  let s = escH(raw);
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
  s = s.replace(/\*([^\s*\n][^*\n]*?)\*/g, '<em>$1</em>');
  s = s.replace(/_([^\s_\n][^_\n]*?)_/g, '<em>$1</em>');
  s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');
  return s;
}
function renderMd(text) {
  if (!text || !text.trim()) return '';
  const lines = text.split('\n');
  const out = []; let i = 0;
  while (i < lines.length) {
    const ln = lines[i];
    if (/^### /.test(ln)) { out.push('<h3 class="md-h3">'+inlineMd(ln.slice(4))+'</h3>'); i++; continue; }
    if (/^## /.test(ln))  { out.push('<h2 class="md-h2">'+inlineMd(ln.slice(3))+'</h2>'); i++; continue; }
    if (/^# /.test(ln))   { out.push('<h1 class="md-h1">'+inlineMd(ln.slice(2))+'</h1>'); i++; continue; }
    if (/^---+\s*$/.test(ln)) { out.push('<hr class="md-hr">'); i++; continue; }
    if (/^> /.test(ln)) { out.push('<blockquote class="md-quote">'+inlineMd(ln.slice(2))+'</blockquote>'); i++; continue; }
    if (/^\s*[-*] /.test(ln)) {
      out.push('<ul class="md-ul">');
      while (i < lines.length && /^\s*[-*] /.test(lines[i])) {
        const lm = lines[i].match(/^(\s*)[-*] (\[x\] |\[ \] )?(.+)/i);
        if (!lm) break;
        const depth = Math.floor(lm[1].length / 2);
        const isDone = lm[2] && /x/i.test(lm[2]);
        const isTodo = !!lm[2];
        const body = inlineMd(lm[3]);
        if (isTodo) {
          out.push(`<li class="md-todo" style="padding-left:${depth*16}px"><span class="tick${isDone?' on':''}" style="flex-shrink:0;margin-top:3px">${isDone?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}</span><span style="${isDone?'text-decoration:line-through;color:#3a3a44':'color:#e6e4dc'}">${body}</span></li>`);
        } else {
          out.push(`<li class="md-li" style="padding-left:${depth*16}px"><span class="md-bullet">●</span><span>${body}</span></li>`);
        }
        i++;
      }
      out.push('</ul>');
      continue;
    }
    if (!ln.trim()) { out.push('<div class="md-gap"></div>'); i++; continue; }
    out.push('<p class="md-p">'+inlineMd(ln)+'</p>');
    i++;
  }
  return out.join('');
}

/* ── push notification constants ── */
const VAPID_PUBLIC_KEY  = 'BMg79Dc4KgbVAa253omi5oER5VpB3ErcDnjaR5lgmIinGMVlUpe4-LUgfuQrTb9a3urAaLnDZgQ_vtE4OvVLcPA';

function vapidKeyBytes() {
  const pad = VAPID_PUBLIC_KEY.length % 4;
  const b64 = (pad ? VAPID_PUBLIC_KEY + '='.repeat(4 - pad) : VAPID_PUBLIC_KEY)
    .replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(b64);
  const out = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
  return out;
}

/* ── notification scheduling (meetings + salah unified) ── */
async function buildSchedule(meetings, salah) {
  const now = Date.now();
  const checkDays = Array.from({ length: 14 }, (_, i) => new Date(now + i * 86400000));
  const OFFSETS = [[15, '15 min'], [5, '5 min']];

  // Build a flat event list — meetings and salah treated identically
  const events = [];

  for (const m of meetings) {
    const [h, min] = (m.time || '00:00').split(':').map(Number);
    for (const day of checkDays) {
      if (!occursOnDay(m, day)) continue;
      const dt = new Date(day); dt.setHours(h, min, 0, 0);
      events.push({ id: `meeting-${m.id}-${fmtKey(day)}`, title: m.title, sub: m.attendees || '', at: dt.getTime(), type: 'meeting' });
    }
  }

  if (salah?.enabled && salah.lat != null) {
    const timesArr = await Promise.all(
      checkDays.map(day => fetchAlAdhan(fmtKey(day), salah.lat, salah.lng, salah.method, salah.asr))
    );
    checkDays.forEach((day, i) => {
      const pt = timesArr[i]; if (!pt) return;
      for (const p of PRAYER_NAMES) {
        if (salah.prayers?.[p] === false) continue;
        const t = pt[p]; if (!t || t === '--:--') continue;
        const [h, min] = t.split(':').map(Number);
        const dt = new Date(day); dt.setHours(h, min, 0, 0);
        events.push({ id: `salah-${p}-${fmtKey(day)}`, title: PRAYER_LABELS[p], sub: '', at: dt.getTime(), type: 'salah', prayer: p });
      }
    });
  }

  // Single loop: reminders + at-time for every event
  const notifications = [];
  for (const evt of events) {
    for (const [offset, label] of OFFSETS) {
      const fireAt = evt.at - offset * 60 * 1000;
      if (fireAt > now) notifications.push({
        id: `${evt.id}-${offset}`,
        title: evt.title,
        body: `In ${label}${evt.sub ? ' · ' + evt.sub : ''}`,
        fireAt, type: evt.type,
        ...(evt.prayer ? { prayer: evt.prayer } : {}),
      });
    }
    if (evt.at > now) notifications.push({
      id: `${evt.id}-0`,
      title: evt.title,
      body: evt.type === 'salah' ? 'Prayer time' : `Starting now${evt.sub ? ' · ' + evt.sub : ''}`,
      fireAt: evt.at,
      type: evt.type === 'salah' ? 'salah_athan' : 'meeting',
      ...(evt.prayer ? { prayer: evt.prayer } : {}),
    });
  }

  return notifications;
}

async function syncPushSchedule(schedule) {
  try {
    const token = localStorage.getItem('folio_token');
    if (!token || !('serviceWorker' in navigator)) return false;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: vapidKeyBytes(),
      });
    }
    const res = await fetch('/api/push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ subscription: sub.toJSON(), schedule }),
    });
    return res.ok;
  } catch {
    return false;
  }
}

async function activatePush() {
  return syncPushSchedule([]);
}

async function scheduleNotifications(meetings, salah) {
  const schedule = await buildSchedule(meetings, salah);
  if (('Notification' in window) && Notification.permission === 'granted' && navigator.serviceWorker?.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'SCHEDULE_NOTIFICATIONS', notifications: schedule });
  }
  syncPushSchedule(schedule);
}
const scheduleCalendarNotifications = (m) => scheduleNotifications(m, null);

/* ── storage + sync ── */
const STORE     = 'folio_v1';
const TOKEN_KEY = 'folio_token';
const ENDPOINT  = '/api/state';

const Sync = {
  getToken() { try { const t = localStorage.getItem(TOKEN_KEY); return t ? t.trim() : null; } catch { return null; } },
  setToken(t) { try { const v = t ? String(t).trim() : ''; v ? localStorage.setItem(TOKEN_KEY,v) : localStorage.removeItem(TOKEN_KEY); } catch {} },
  configured() { return !!this.getToken(); },
  async load() {
    const token = this.getToken();
    if (!token) throw new Error('NO_TOKEN');
    const r = await fetch(ENDPOINT, { headers: { Authorization:`Bearer ${token}` } });
    if (r.status === 401) throw new Error('UNAUTHORIZED');
    if (!r.ok) throw new Error(`HTTP_${r.status}`);
    return r.json();
  },
  async save(state) {
    const token = this.getToken();
    if (!token) throw new Error('NO_TOKEN');
    const r = await fetch(ENDPOINT, {
      method: 'PUT',
      headers: { Authorization:`Bearer ${token}`, 'Content-Type':'application/json' },
      body: JSON.stringify(state),
    });
    if (r.status === 401) throw new Error('UNAUTHORIZED');
    if (!r.ok) throw new Error(`HTTP_${r.status}`);
    return r.json().catch(()=>({}));
  },
};

const SALAH_METHODS = {
  mwl:     { name:'Muslim World League',                id:3 },
  isna:    { name:'ISNA (North America)',               id:2 },
  egypt:   { name:'Egyptian General Authority',         id:5 },
  makkah:  { name:"Umm Al-Qura (Makkah)",              id:4 },
  karachi: { name:'University of Karachi',               id:1 },
  tehran:  { name:'Geophysics Inst. Tehran',             id:7 },
};
const PRAYER_NAMES  = ['fajr','sunrise','dhuhr','asr','maghrib','isha'];
const PRAYER_LABELS = { fajr:'Fajr', sunrise:'Sunrise (Shuruq)', dhuhr:'Dhuhr', asr:'Asr', maghrib:'Maghrib', isha:'Isha' };
const SALAH_CACHE_PFX = 'folio_salah_';

async function fetchAlAdhan(dateKey, lat, lon, method, asrJuristic) {
  const m      = (SALAH_METHODS[method] || SALAH_METHODS.mwl).id;
  const school = asrJuristic === 'hanafi' ? 1 : 0;
  const cacheKey = `${SALAH_CACHE_PFX}${dateKey}_${Number(lat).toFixed(3)}_${Number(lon).toFixed(3)}_m${m}_s${school}`;
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) return JSON.parse(cached);
  } catch {}
  const [y, mo, d] = dateKey.split('-');
  try {
    const r = await fetch(
      `https://api.aladhan.com/v1/timings/${d}-${mo}-${y}?latitude=${lat}&longitude=${lon}&method=${m}&school=${school}`
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const json = await r.json();
    const t = json.data.timings;
    const strip = s => (s || '--:--').split(' ')[0];
    const result = {
      fajr: strip(t.Fajr), sunrise: strip(t.Sunrise), dhuhr: strip(t.Dhuhr),
      asr: strip(t.Asr), maghrib: strip(t.Maghrib), isha: strip(t.Isha),
    };
    try { localStorage.setItem(cacheKey, JSON.stringify(result)); } catch {}
    return result;
  } catch { return null; }
}

function useSalahTimes(dateKey, salah) {
  const [times, setTimes] = React.useState(null);
  React.useEffect(() => {
    if (!salah?.enabled || salah.lat == null || salah.lng == null) { setTimes(null); return; }
    let cancelled = false;
    fetchAlAdhan(dateKey, salah.lat, salah.lng, salah.method, salah.asr)
      .then(t => { if (!cancelled) setTimes(t); });
    return () => { cancelled = true; };
  }, [dateKey, salah?.lat, salah?.lng, salah?.method, salah?.asr, salah?.enabled]);
  return times;
}

/* ── CodeBlock ── */
function CodeBlock({ value='', lang='javascript', onChange, onLangChange }) {
  const taRef  = useRef(null);
  const preRef = useRef(null);
  const gutRef = useRef(null);
  const lines  = value.split('\n');
  const lineCount = Math.max(lines.length, 1);
  const h = Math.max(80, lineCount * 21 + 28);
  const gutW = Math.max(36, String(lineCount).length * 9 + 20);

  const langSafe = safeLang(lang);
  const highlighted = useMemo(() => {
    if (!window.Prism || !Prism.languages[langSafe]) return value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return Prism.highlight(value, Prism.languages[langSafe], langSafe);
  }, [value, langSafe]);

  const sync = () => {
    if (preRef.current && taRef.current) preRef.current.scrollTop = taRef.current.scrollTop;
    if (gutRef.current  && taRef.current) gutRef.current.scrollTop  = taRef.current.scrollTop;
  };

  return (
    <div style={{marginTop:4}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
        <select value={lang} onChange={e=>onLangChange(e.target.value)}

          {LANGS.map(l=><option key={l} value={l}>{l}</option>)}
        </select>
        <button onClick={()=>navigator.clipboard.writeText(value)} style={{background:'none',border:'none',color:'#9a9788',cursor:'pointer',display:'flex',alignItems:'center',gap:3,fontSize:11}}>
          <svg style={{width:12,height:12}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          copy
        </button>
      </div>
      <div className="code-wrap" style={{height:h,display:'flex'}}>
        <div ref={gutRef} style={{width:gutW,flexShrink:0,overflowY:'hidden',padding:'12px 8px 12px 10px',textAlign:'right',fontFamily:'"JetBrains Mono",monospace',fontSize:'12.5px',lineHeight:'1.6',color:'#3a3a44',userSelect:'none',background:'#0d0d10',borderRight:'1px solid #1f1f24'}}>

          <pre ref={preRef} className={`language-${langSafe}`} style={{margin:0,height:'100%',overflow:'hidden',padding:'12px 16px'}}>
            <code className={`language-${langSafe}`} dangerouslySetInnerHTML={{__html:highlighted+'\n'}}/>
          </pre>
          <textarea ref={taRef} value={value} onChange={e=>onChange(e.target.value)} onScroll={sync} spellCheck={false}/>
        </div>
      </div>
    </div>
  );
}

/* ── ContextMenu ── */
function ContextMenu({ x, y, items, onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const onDown = e => { if (!ref.current?.contains(e.target)) onClose(); };
    const onKey  = e => { if (e.key === 'Escape') onClose(); };
    setTimeout(() => {
      document.addEventListener('mousedown', onDown);
      document.addEventListener('contextmenu', onDown);
      document.addEventListener('keydown', onKey);
    }, 0);
    return () => {
      document.removeEventListener('mousedown', onDown);
      document.removeEventListener('contextmenu', onDown);
      document.removeEventListener('keydown', onKey);
    };
  }, []);
  // Keep menu inside viewport
  const vpW = window.innerWidth, vpH = window.innerHeight;
  const menuW = 180, menuH = items.length * 36 + 12;
  const left = x + menuW > vpW ? vpW - menuW - 8 : x;
  const top  = y + menuH > vpH ? vpH - menuH - 8 : y;
  return ReactDOM.createPortal(
    <div ref={ref} className="ctx-menu" style={{left,top}}>
      {items.map((item,i) => item === 'sep'
        ? <div key={i} className="ctx-sep"/>
        : <div key={item.label} className={`ctx-item${item.danger?' danger':''}`}
            onClick={()=>{ item.fn(); onClose(); }}>
            {item.icon&&<span style={{width:14,display:'flex',alignItems:'center',flexShrink:0}}>{item.icon}</span>}
            {item.label}
          </div>
      )}
    </div>,
    document.body
  );
}
