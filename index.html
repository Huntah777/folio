    </div>
  );
}

/* ── MiniCalendar (for notes date filter) ── */
const MCAL_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MCAL_DAYS   = ['S','M','T','W','T','F','S'];

function MiniCalendar({ value, onChange, onClose }) {
  const ref = useRef(null);
  const init = value ? parseKey(value) : new Date();
  const [view, setView] = useState(new Date(init.getFullYear(), init.getMonth(), 1));
  useEffect(() => {
    const h = e => { if (!ref.current?.contains(e.target)) onClose(); };
    setTimeout(() => document.addEventListener('mousedown', h), 0);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const yr = view.getFullYear(), mo = view.getMonth();
  const firstDow = new Date(yr, mo, 1).getDay();
  const days     = new Date(yr, mo + 1, 0).getDate();
  const cells    = Array(firstDow).fill(null).concat(Array.from({length:days},(_,i)=>i+1));
  return (
    <div ref={ref} style={{position:'absolute',top:'calc(100% + 4px)',right:0,zIndex:200,background:'#17171b',border:'1px solid #2a2a31',borderRadius:12,padding:'12px 12px 10px',width:224,boxShadow:'0 12px 40px rgba(0,0,0,.8)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <button onClick={()=>setView(new Date(yr,mo-1,1))} style={{background:'none',border:'none',color:'#9a9788',fontSize:17,cursor:'pointer',lineHeight:1,padding:'0 6px',borderRadius:5}} onMouseEnter={e=>e.currentTarget.style.color='#f4f3ee'} onMouseLeave={e=>e.currentTarget.style.color='#9a9788'}>‹</button>
        <span style={{fontSize:12,fontWeight:700,color:'#f4f3ee'}}>{MCAL_MONTHS[mo]} {yr}</span>
        <button onClick={()=>setView(new Date(yr,mo+1,1))} style={{background:'none',border:'none',color:'#9a9788',fontSize:17,cursor:'pointer',lineHeight:1,padding:'0 6px',borderRadius:5}} onMouseEnter={e=>e.currentTarget.style.color='#f4f3ee'} onMouseLeave={e=>e.currentTarget.style.color='#9a9788'}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:3}}>
        {MCAL_DAYS.map((d,i)=><div key={i} style={{textAlign:'center',fontSize:10,color:'#3a3a44',fontWeight:700,padding:'2px 0'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {cells.map((d,i)=>{
          if (!d) return <div key={i}/>;
          const key = fmtKey(new Date(yr,mo,d));
          const sel = key === value;
          const isToday = key === todayKey();
          return (
            <button key={i} onClick={()=>{ onChange(sel ? null : key); if (!sel) onClose(); }}
              style={{background:sel?'#818cf8':isToday&&!sel?'#17171b':'none',border:isToday&&!sel?'1px solid #818cf840':'1px solid transparent',borderRadius:6,color:sel?'#fff':isToday?'#818cf8':'#c9c6b8',fontSize:11,padding:'4px 0',cursor:'pointer',transition:'all 80ms',textAlign:'center',lineHeight:1.4}}
              onMouseEnter={e=>{ if(!sel) e.currentTarget.style.background='#2a2a31'; }}
              onMouseLeave={e=>{ if(!sel) e.currentTarget.style.background=isToday?'#17171b':'none'; }}>
              {d}
            </button>
          );
        })}
      </div>
      {value&&<button onClick={()=>onChange(null)} style={{marginTop:8,width:'100%',background:'none',border:'1px solid #2a2a31',borderRadius:6,color:'#9a9788',fontSize:11,padding:'5px',cursor:'pointer',fontFamily:'Manrope,sans-serif',transition:'all 110ms'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#818cf8';e.currentTarget.style.color='#818cf8';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#2a2a31';e.currentTarget.style.color='#9a9788';}}>Clear date filter</button>}
    </div>
  );
}

/* ── NoteEditor ── */
function NoteEditor({ note, state, update, isMobile }) {
  const [showCode, setShowCode] = useState(false);
  const [codeLang, setCodeLang] = useState('javascript');
  const [codeVal, setCodeVal] = useState('');
  const [showTagPicker, setShowTagPicker] = useState(false);
  const [tagInput, setTagInput] = useState('');
  const [tagFocused, setTagFocused] = useState(false);
  const [showLinkSearch, setShowLinkSearch] = useState(false);
  const [linkQuery, setLinkQuery] = useState('');
  const [showEmojiPicker, setShowEmojiPicker] = useState(false);
  const [showWebLink, setShowWebLink] = useState(false);
  const [wlUrl,   setWlUrl]   = useState('');
  const [wlTitle, setWlTitle] = useState('');
  const [previewMode, setPreviewMode] = useState(false);
  const imgInputRef = useRef(null);
  const mdInputRef  = useRef(null);
  const activeTA = useRef(null); /* { el, partIdx, pos } */

  /* ── bodyParts — MUST be before any early return (Rules of Hooks) ── */
  const bodyParts = useMemo(() => {
    if (!note) return [{type:'text',content:''}];
    const parts=[]; let rest=note.body||'';
    const re=/```(\w+)?\n([\s\S]*?)```|\[url:(.*?)\|(.*?)\]|\[img:([^\]]+)\]/g; let m; let last=0;
    while((m=re.exec(rest))!==null){
      if(m.index>last) parts.push({type:'text',content:rest.slice(last,m.index)});
      if(m[0].startsWith('```'))
        parts.push({type:'code',lang:m[1]||'plaintext',content:m[2].replace(/\n$/,'')});
      else if(m[5]!==undefined)
        parts.push({type:'image',id:m[5]});
      else
        parts.push({type:'link',title:m[3]||'',url:m[4]||''});
      last=m.index+m[0].length;
    }
    if(last<rest.length) parts.push({type:'text',content:rest.slice(last)});
    if(!parts.length) return [{type:'text',content:''}];
    if(parts[0].type !== 'text') parts.unshift({type:'text',content:''});
    if(parts[parts.length-1].type !== 'text') parts.push({type:'text',content:''});
    return parts;
  }, [note?.body]);

  if (!note) return (
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
      <div style={{fontFamily:'Fraunces,serif',fontSize:18,color:'#2a2a31'}}>Select or create a note</div>
    </div>
  );

  const upNote = patch => update('notes', state.notes.map(n => n.id===note.id ? {...n,...patch,updated:Date.now()} : n));
  const removeTag = t => upNote({ tags: note.tags.filter(x=>x!==t) });
  const addTag = t => { const clean=t.startsWith('#')?t:'#'+t; if(!note.tags.includes(clean)) upNote({tags:[...note.tags,clean]}); };

  const rebuildBody = np => np.map(p=>{
    if(p.type==='code') return '```'+p.lang+'\n'+p.content+'\n```';
    if(p.type==='link') return '[url:'+p.title+'|'+p.url+']';
    if(p.type==='image') return '[img:'+p.id+']';
    return p.content;
  }).join('');

  /* ── formatting toolbar ── */
  const insertLinePrefix = prefix => {
    if (!activeTA.current) return;
    const { el, partIdx } = activeTA.current;
    const pos = el.selectionStart;
    const val = el.value;
    const lineStart = val.lastIndexOf('\n', pos-1)+1;
    const newVal = val.slice(0,lineStart)+prefix+val.slice(lineStart);
    const np=[...bodyParts]; np[partIdx]={...np[partIdx],content:newVal};
    upNote({body:rebuildBody(np)});
    setTimeout(()=>{ el.focus(); el.selectionStart=el.selectionEnd=lineStart+prefix.length+(pos-lineStart); },0);
  };

  /* Toggle a block-level prefix on the current line — strips whatever prefix is
     already there, then applies the new one (or just removes it if it was the same). */
  const toggleLinePrefix = prefix => {
    if (!activeTA.current) return;
    const { el, partIdx } = activeTA.current;
    const pos = el.selectionStart;
    const val = el.value;
    const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
    const lineEnd = val.indexOf('\n', pos);
    const lineEndPos = lineEnd === -1 ? val.length : lineEnd;
    const line = val.slice(lineStart, lineEndPos);
    const existingM = line.match(/^(#{1,3} |[-*] (?:\[[ xX]\] )?|> )/);
    const existingPrefix = existingM ? existingM[0] : '';
    const rawContent = line.slice(existingPrefix.length);
    const newLine = existingPrefix === prefix ? rawContent : prefix + rawContent;
    const cursorDelta = newLine.length - line.length;
    const newVal = val.slice(0, lineStart) + newLine + val.slice(lineEndPos);
    const np = [...bodyParts]; np[partIdx] = {...np[partIdx], content: newVal};
    upNote({body: rebuildBody(np)});
    setTimeout(() => { el.focus(); el.selectionStart = el.selectionEnd = Math.max(lineStart, pos + cursorDelta); }, 0);
  };

  const FMT = [
    {label:'H1', title:'Heading 1', fn:()=>toggleLinePrefix('# ')},
    {label:'H2', title:'Heading 2', fn:()=>toggleLinePrefix('## ')},
    {label:'H3', title:'Heading 3', fn:()=>toggleLinePrefix('### ')},
    {label:'•',  title:'Bullet list', fn:()=>toggleLinePrefix('- ')},
    {label:'☐',  title:'Todo item', fn:()=>toggleLinePrefix('- [ ] ')},
    {label:'"',  title:'Quote', fn:()=>toggleLinePrefix('> ')},
    {label:'—',  title:'Divider', fn:()=>insertLinePrefix('---\n')},
  ];

  /* ── @Today auto-replace ── */
  const todayStamp = () => {
    const now = new Date();
    return now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) +
           ' ' + now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  };

  const handleTitleChange = e => {
    let val = e.target.value;
    const pos = e.target.selectionStart;
    e.target.style.height = 'auto';
    e.target.style.height = e.target.scrollHeight + 'px';
    const match = val.slice(0, pos).match(/@[Tt]oday$/);
    if (match) {
      const stamp  = todayStamp();
      const before = val.slice(0, pos - match[0].length);
      const after  = val.slice(pos);
      val = before + stamp + after;
      upNote({title: val});
      setTimeout(()=>{ e.target.selectionStart = e.target.selectionEnd = before.length + stamp.length; }, 0);
      return;
    }
    upNote({title: val});
  };

  const handleBodyChange = (e, partIdx) => {
    let content = e.target.value;
    const pos = e.target.selectionStart;
    const match = content.slice(0, pos).match(/@[Tt]oday$/);
    if (match) {
      const stamp  = todayStamp();
      const before = content.slice(0, pos - match[0].length);
      const after  = content.slice(pos);
      content = before + stamp + after;
      const np=[...bodyParts]; np[partIdx]={...np[partIdx],content};
      upNote({body:rebuildBody(np)});
      setTimeout(()=>{ e.target.selectionStart=e.target.selectionEnd=before.length+stamp.length; },0);
      return;
    }
    const np=[...bodyParts]; np[partIdx]={...np[partIdx],content};
    upNote({body:rebuildBody(np)});
  };

  const handleCheckboxToggle = (partIdx, cbIdx) => {
    const lines = bodyParts[partIdx].content.split('\n');
    let n = 0;
    const toggled = lines.map(line => {
      const m = line.match(/^(\s*[-*] )(\[[ x]\] )(.*)$/i);
      if (m) {
        if (n === cbIdx) { n++; return m[1] + (/x/i.test(m[2]) ? '[ ] ' : '[x] ') + m[3]; }
        n++;
      }
      return line;
    });
    const np = [...bodyParts]; np[partIdx] = {...np[partIdx], content: toggled.join('\n')};
    upNote({body: rebuildBody(np)});
  };

  /* ── Smart keyboard handling for the note body ── */
  const handleBodyKeyDown = (e, partIdx) => {
    const el = e.target;
    const pos = el.selectionStart;
    const selEnd = el.selectionEnd;
    const val = el.value;
    const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
    const lineEnd = val.indexOf('\n', pos);
    const lineEndPos = lineEnd === -1 ? val.length : lineEnd;
    const line = val.slice(lineStart, lineEndPos);
    // matches: (indent)(bullet char) (optional todo prefix)(content)
    const bm = line.match(/^(\s*)([-*]) (\[[ xX]\] )?(.*)$/);

    const apply = (newContent, newPos) => {
      const np = [...bodyParts]; np[partIdx] = {...np[partIdx], content: newContent};
      upNote({body: rebuildBody(np)});
      setTimeout(() => { el.selectionStart = el.selectionEnd = newPos; }, 0);
    };

    // ── Tab / Shift+Tab: indent or unindent current line ──
    if (e.key === 'Tab') {
      e.preventDefault();
      if (bm) {
        if (e.shiftKey) {
          if (bm[1].length < 2) return;
          apply(val.slice(0, lineStart) + line.slice(2) + val.slice(lineEndPos), Math.max(lineStart, pos - 2));
        } else {
          apply(val.slice(0, lineStart) + '  ' + line + val.slice(lineEndPos), pos + 2);
        }
      } else {
        apply(val.slice(0, pos) + '  ' + val.slice(pos), pos + 2);
      }
      return;
    }

    // ── Enter: smart bullet/todo continuation ──
    if (e.key === 'Enter' && !e.shiftKey && bm) {
      e.preventDefault();
      const indent = bm[1];
      const todoPrefix = bm[3] || '';
      const content = bm[4] || '';

      if (!content.trim()) {
        // Empty bullet — unindent one level, or exit list if already at root
        if (indent.length >= 2) {
          const newLine = indent.slice(2) + '- ' + (todoPrefix ? '[ ] ' : '');
          apply(val.slice(0, lineStart) + newLine + val.slice(lineEndPos), lineStart + newLine.length);
        } else {
          // Remove the empty bullet entirely
          apply(val.slice(0, lineStart) + val.slice(lineEndPos), lineStart);
        }
      } else {
        // Continue list: new bullet at same indent + same type
        const newBullet = '\n' + indent + '- ' + (todoPrefix ? '[ ] ' : '');
        apply(val.slice(0, pos) + newBullet + val.slice(pos), pos + newBullet.length);
      }
      return;
    }

    // ── Backspace: remove empty bullet / unindent ──
    if (e.key === 'Backspace' && bm && pos === selEnd) {
      const prefixLen = bm[1].length + 2 + (bm[3] ? bm[3].length : 0);
      const contentStart = lineStart + prefixLen;
      if (pos === contentStart && !bm[4]) {
        e.preventDefault();
        if (bm[1].length >= 2) {
          // Unindent first
          const newLine = bm[1].slice(2) + '- ' + (bm[3] ? '[ ] ' : '');
          apply(val.slice(0, lineStart) + newLine + val.slice(lineEndPos), lineStart + newLine.length);
        } else if (lineStart > 0) {
          // Remove the bullet line and merge with previous line
          apply(val.slice(0, lineStart - 1) + val.slice(lineEndPos), lineStart - 1);
        } else {
          // First line: strip the bullet prefix
          apply(val.slice(prefixLen), 0);
        }
        return;
      }
    }
  };

  /* ── image upload ── */
  const handleImg = e => {
    const file = e.target.files?.[0];
    if (!file||!file.type.startsWith('image/')||file.size>MAX_IMAGE_BYTES) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const id = uid();
      const newImages = [...(note.images||[]), {id, src:ev.target.result, alt:file.name, caption:''}];
      insertAtCursor(
        {type:'image', id},
        (note.body||'')+'\n\n[img:'+id+']',
        {images: newImages}
      );
    };
    reader.readAsDataURL(file);
    e.target.value='';
  };

  /* ── markdown import / export ── */
  const insertTextAtCursor = text => {
    if (activeTA.current) {
      const { partIdx, pos=0 } = activeTA.current;
      const cur = bodyParts[partIdx];
      if (cur && cur.type==='text') {
        const before = cur.content.slice(0,pos);
        const after  = cur.content.slice(pos);
        const np=[...bodyParts]; np[partIdx]={...np[partIdx],content:before+text+after};
        upNote({body:rebuildBody(np)});
        return;
      }
    }
    upNote({body:(note.body?note.body+'\n\n':'')+text});
  };
  const handleMdUpload = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => insertTextAtCursor(ev.target.result);
    reader.readAsText(file, 'UTF-8');
    e.target.value='';
  };
  const exportMd = () => {
    const content = note.body || '';
    const blob = new Blob([content], {type:'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (note.title||'note').replace(/[^a-zA-Z0-9\-_ ]/g,'').trim()||'note';
    a.download += '.md';
    a.click();
    URL.revokeObjectURL(url);
  };

  /* ── linked notes ── */
  const addWebLink = e => {
    e.preventDefault();
    if (!wlUrl.trim()) return;
    const raw = /^https?:\/\//i.test(wlUrl) ? wlUrl.trim() : 'https://'+wlUrl.trim();
    const url = safeHttpUrl(raw);
    if (!url) return;
    const title = wlTitle.trim() || (() => { try { return new URL(url).hostname; } catch { return url; } })();
    insertAtCursor(
      {type:'link', title, url},
      (note.body||'')+'\n\n[url:'+title+'|'+url+']'
    );
    setWlUrl(''); setWlTitle(''); setShowWebLink(false);
  };
  const removeWebLink = id => upNote({webLinks:(note.webLinks||[]).filter(l=>l.id!==id)});

  const addLink = id => { if(!(note.links||[]).includes(id)) upNote({links:[...(note.links||[]),id]}); setLinkQuery(''); };
  const removeLink = id => upNote({links:(note.links||[]).filter(x=>x!==id)});
  const linkedNotes = (note.links||[]).map(id=>state.notes.find(n=>n.id===id)).filter(Boolean);
  const linkable = state.notes.filter(n=>n.id!==note.id&&(!linkQuery||n.title.toLowerCase().includes(linkQuery.toLowerCase())));

  /* ── insert a part at the active cursor position, or append ── */
  const insertAtCursor = (newPart, fallbackBody, extraPatch={}) => {
    if (activeTA.current) {
      const { partIdx, pos=0 } = activeTA.current;
      const cur = bodyParts[partIdx];
      if (cur && cur.type==='text') {
        const before = cur.content.slice(0, pos);
        const after  = cur.content.slice(pos);
        const np = [...bodyParts];
        np.splice(partIdx, 1,
          {type:'text', content: before},
          newPart,
          {type:'text', content: after}
        );
        upNote({body: rebuildBody(np), ...extraPatch});
        return;
      }
    }
    upNote({body: fallbackBody, ...extraPatch});
  };

  /* ── code insert ── */
  const insertCode = () => {
    if (!codeVal.trim()) return;
    insertAtCursor(
      {type:'code', lang:codeLang, content:codeVal},
      (note.body||'')+'\n\n```'+codeLang+'\n'+codeVal+'\n```'
    );
    setCodeVal(''); setShowCode(false);
  };

  /* ── toolbar button style helper ── */
  const tbBtn = {background:'none',border:'1px solid #1f1f24',borderRadius:5,color:'#9a9788',padding:'3px 8px',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'JetBrains Mono,monospace',transition:'all 110ms'};

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

      {/* ── title + emoji ── */}
      <div style={{padding:isMobile?'16px 14px 0':'24px 32px 0',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:14}}>
          <div style={{position:'relative',flexShrink:0}}>
            <span style={{fontSize:28,cursor:'pointer',lineHeight:1.3,display:'block',borderRadius:8,padding:'0 2px',transition:'background 120ms'}}
              title="Click to pick emoji"
              onClick={()=>setShowEmojiPicker(v=>!v)}
              onMouseEnter={e=>e.currentTarget.style.background='#17171b'}
              onMouseLeave={e=>e.currentTarget.style.background='none'}>
              {note.emoji||'📝'}
            </span>
            {showEmojiPicker&&<EmojiPicker onSelect={em=>upNote({emoji:em})} onClose={()=>setShowEmojiPicker(false)}/>}
          </div>
          <textarea className="editor-title" rows={1} value={note.title}
            onChange={handleTitleChange}
            placeholder="Untitled" style={{height:'auto'}}/>
        </div>

        {/* tags row */}
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',paddingBottom:10}} className="divider">
          {note.tags.map(t=>(
            <span key={t} className="tag" style={{background:`${tagColor(t)}18`,color:tagColor(t)}}>
              {t}<span onClick={()=>removeTag(t)} style={{cursor:'pointer',opacity:.7,marginLeft:2}}>×</span>
            </span>
          ))}
          {showTagPicker ? (() => {
            const allTags = [...new Set(state.notes.flatMap(n=>n.tags))];
            const suggestions = allTags.filter(t =>
              !note.tags.includes(t) &&
              (!tagInput || t.toLowerCase().includes(tagInput.replace(/^#/,'').toLowerCase()))
            ).slice(0,6);
            return (
              <div style={{position:'relative'}}>
                <form onSubmit={e=>{e.preventDefault();addTag(tagInput);setTagInput('');setShowTagPicker(false);setTagFocused(false);}} style={{display:'flex',gap:4}}>
                  <input autoFocus value={tagInput}
                    onChange={e=>setTagInput(e.target.value)}
                    onFocus={()=>setTagFocused(true)}
                    onBlur={()=>setTimeout(()=>setTagFocused(false),150)}
                    placeholder="#tag"
                    style={{background:'#17171b',border:'1px solid #2a2a31',borderRadius:6,padding:'2px 8px',color:'#f4f3ee',fontSize:12,width:110,outline:'none'}}/>
                  <button type="submit" style={{background:'#818cf8',border:'none',borderRadius:6,color:'#fff',padding:'2px 8px',fontSize:12,cursor:'pointer'}}>add</button>
                  <button type="button" onClick={()=>{setShowTagPicker(false);setTagInput('');}} style={{background:'none',border:'none',color:'#9a9788',cursor:'pointer',fontSize:15,lineHeight:1}}>×</button>
                </form>
                {tagFocused && suggestions.length>0 && (
                  <div style={{position:'absolute',top:'100%',left:0,marginTop:4,background:'#131317',border:'1px solid #2a2a31',borderRadius:8,padding:'4px',zIndex:20,minWidth:140,boxShadow:'0 8px 24px rgba(0,0,0,.5)'}}>
                    {suggestions.map(t=>(
                      <div key={t} onMouseDown={()=>{addTag(t);setTagInput('');setShowTagPicker(false);}}
                        style={{display:'flex',alignItems:'center',gap:6,padding:'5px 8px',borderRadius:5,cursor:'pointer',transition:'background 100ms'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#1f1f24'}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                        <span style={{width:7,height:7,borderRadius:99,background:tagColor(t),flexShrink:0,display:'inline-block'}}/>
                        <span style={{fontSize:12,color:'#c9c6b8'}}>{t}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })() : (
            <button onClick={()=>setShowTagPicker(true)} style={{background:'none',border:'1px dashed #2a2a31',borderRadius:6,color:'#3a3a44',padding:'2px 8px',fontSize:11,cursor:'pointer',display:'flex',alignItems:'center',gap:3}}>
              <svg style={{width:9,height:9}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>tag
            </button>
          )}
          {/* folder picker */}
          {(()=>{
            const folders = state.folders||[];
            const cur = folders.find(f=>f.id===note.folderId);
            return (
              <div style={{marginLeft:'auto',flexShrink:0}}>
                <select value={note.folderId||''} onChange={e=>upNote({folderId:e.target.value||null})}
                  style={{background:'#17171b',border:'1px solid #2a2a31',borderRadius:6,color:cur?'#818cf8':'#3a3a44',fontSize:11,padding:'2px 7px',cursor:'pointer',outline:'none'}}>
                  <option value=''>📁 No folder</option>
                  {folders.map(f=><option key={f.id} value={f.id}>📁 {f.name}</option>)}
                </select>
              </div>
            );
          })()}
        </div>
      </div>

      {/* ── formatting toolbar ── */}
      <div style={{padding:isMobile?'7px 12px':'7px 32px',borderBottom:'1px solid #1f1f24',display:'flex',gap:4,alignItems:'center',flexShrink:0,flexWrap:'wrap'}}>
        {FMT.map(f=>(
          <button key={f.label} onClick={f.fn} title={f.title} style={tbBtn}
            onMouseEnter={e=>{e.currentTarget.style.background='#17171b';e.currentTarget.style.color='#f4f3ee';}}
            onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color='#9a9788';}}>
            {f.label}
          </button>
        ))}
        <div style={{width:1,height:14,background:'#2a2a31',margin:'0 2px'}}/>
        {/* image */}
        <button onClick={()=>imgInputRef.current?.click()} title="Upload image" style={{...tbBtn,display:'flex',alignItems:'center',gap:3}}
          onMouseEnter={e=>{e.currentTarget.style.background='#17171b';e.currentTarget.style.color='#f4f3ee';}}
          onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color='#9a9788';}}>
          <svg style={{width:10,height:10}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>img
        </button>
        <input ref={imgInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleImg}/>
        {/* code */}
        <button onClick={()=>setShowCode(v=>!v)} title="Add code snippet" style={{...tbBtn,display:'flex',alignItems:'center',gap:3}}
          onMouseEnter={e=>{e.currentTarget.style.background='#17171b';e.currentTarget.style.color='#f4f3ee';}}
          onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color='#9a9788';}}>
          <svg style={{width:10,height:10}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>code
        </button>
        {/* web url */}
        <button onClick={()=>{setShowWebLink(v=>!v);setShowLinkSearch(false);}} title="Add web link"
          style={{...tbBtn,display:'flex',alignItems:'center',gap:3,color:showWebLink?'#818cf8':'#9a9788',borderColor:showWebLink?'#818cf8':'#1f1f24'}}
          onMouseEnter={e=>{e.currentTarget.style.background='#17171b';}}
          onMouseLeave={e=>{e.currentTarget.style.background='none';}}>
          <svg style={{width:10,height:10}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>url
        </button>
        {/* link note */}
        <button onClick={()=>{setShowLinkSearch(v=>!v);setShowWebLink(false);}} title="Link a note" style={{...tbBtn,display:'flex',alignItems:'center',gap:3,color:showLinkSearch?'#818cf8':'#9a9788',borderColor:showLinkSearch?'#818cf8':'#1f1f24'}}
          onMouseEnter={e=>{e.currentTarget.style.background='#17171b';}}
          onMouseLeave={e=>{e.currentTarget.style.background='none';}}>
          <svg style={{width:10,height:10}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>link
        </button>
        <div style={{width:1,height:14,background:'#2a2a31',margin:'0 2px'}}/>
        {/* .md import */}
        <button onClick={()=>mdInputRef.current?.click()} title="Import a .md file" style={{...tbBtn,display:'flex',alignItems:'center',gap:3}}
          onMouseEnter={e=>{e.currentTarget.style.background='#17171b';e.currentTarget.style.color='#f4f3ee';}}
          onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color='#9a9788';}}>
          <svg style={{width:10,height:10}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>.md
        </button>
        <input ref={mdInputRef} type="file" accept=".md,.markdown,text/markdown,text/plain" style={{display:'none'}} onChange={handleMdUpload}/>
        {/* .md export */}
        <button onClick={exportMd} title="Export as .md file" style={{...tbBtn,display:'flex',alignItems:'center',gap:3}}
          onMouseEnter={e=>{e.currentTarget.style.background='#17171b';e.currentTarget.style.color='#f4f3ee';}}
          onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color='#9a9788';}}>
          <svg style={{width:10,height:10}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>↓md
        </button>
        <div style={{marginLeft:'auto'}}>
          <button onClick={()=>setPreviewMode(v=>!v)} title={previewMode?'Back to editing':'Preview rendered markdown'}
            style={{...tbBtn,color:previewMode?'#818cf8':'#9a9788',borderColor:previewMode?'#818cf8':'#1f1f24',fontSize:11}}
            onMouseEnter={e=>{e.currentTarget.style.background='#17171b';}}
            onMouseLeave={e=>{e.currentTarget.style.background='none';}}>
            {previewMode ? 'edit' : 'preview'}
          </button>
        </div>
      </div>

      {/* ── body ── */}
      <div style={{flex:1,overflow:'auto',padding:isMobile?'12px 14px 24px':'14px 32px 32px'}} className="scrollbar">

        {/* web link panel */}
        {showWebLink && (
          <form onSubmit={addWebLink} style={{background:'#17171b',border:'1px solid #2a2a31',borderRadius:10,padding:'10px 12px',marginBottom:14,display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:11,color:'#9a9788'}}>Add a web link:</div>
            <input autoFocus value={wlUrl} onChange={e=>setWlUrl(e.target.value)} placeholder="https://example.com"
              style={{background:'#0d0d10',border:'1px solid #2a2a31',borderRadius:6,padding:'6px 10px',color:'#f4f3ee',fontSize:13,outline:'none',fontFamily:'Manrope,sans-serif'}}/>
            <input value={wlTitle} onChange={e=>setWlTitle(e.target.value)} placeholder="Label (optional)"
              style={{background:'#0d0d10',border:'1px solid #2a2a31',borderRadius:6,padding:'6px 10px',color:'#f4f3ee',fontSize:13,outline:'none',fontFamily:'Manrope,sans-serif'}}/>
            <div style={{display:'flex',gap:8}}>
              <button type="submit" className="btn-primary" style={{fontSize:12,padding:'5px 14px'}}>Add link</button>
              <button type="button" className="btn-ghost" onClick={()=>{setShowWebLink(false);setWlUrl('');setWlTitle('');}} style={{fontSize:12,padding:'5px 12px'}}>Cancel</button>
            </div>
          </form>
        )}

        {/* link search dropdown */}
        {showLinkSearch && (
          <div style={{background:'#17171b',border:'1px solid #2a2a31',borderRadius:10,padding:'10px 12px',marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <div style={{fontSize:11,color:'#9a9788'}}>Link notes — click to add or remove:</div>
              <button onClick={()=>{setShowLinkSearch(false);setLinkQuery('');}} style={{background:'none',border:'none',color:'#9a9788',cursor:'pointer',fontSize:11,padding:'0 2px'}}>Done</button>
            </div>
            <input autoFocus value={linkQuery} onChange={e=>setLinkQuery(e.target.value)} placeholder="Search by title…"
              style={{background:'#0d0d10',border:'1px solid #2a2a31',borderRadius:6,padding:'5px 10px',color:'#f4f3ee',fontSize:12.5,width:'100%',outline:'none',marginBottom:6,boxSizing:'border-box'}}/>
            <div style={{maxHeight:160,overflow:'auto'}}>
              {linkable.slice(0,10).map(n=>{
                const linked = (note.links||[]).includes(n.id);
                return <div key={n.id}
                  onClick={()=>linked ? removeLink(n.id) : addLink(n.id)}
                  style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:6,cursor:'pointer',transition:'background 110ms',opacity:linked?1:0.85}}
                  onMouseEnter={e=>e.currentTarget.style.background='#2a2a31'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <span style={{fontSize:13,flexShrink:0}}>{n.emoji||'📝'}</span>
                  <span style={{fontSize:13,color:'#f4f3ee',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.title||'Untitled'}</span>
                  {linked && <span style={{fontSize:11,color:'#818cf8',flexShrink:0,fontWeight:600}}>✓ linked</span>}
                </div>;
              })}
              {linkable.length===0&&<div style={{color:'#3a3a44',fontSize:12,padding:'4px 8px'}}>No other notes found.</div>}
            </div>
          </div>
        )}

        {/* text + code + inline link + inline image parts */}
        {bodyParts.map((part,i)=>
          part.type==='code'
            ? <CodeBlock key={i} value={part.content} lang={part.lang}
                onChange={v=>{const np=[...bodyParts];np[i]={...np[i],content:v};upNote({body:rebuildBody(np)});}}
                onLangChange={l=>{const np=[...bodyParts];np[i]={...np[i],lang:l};upNote({body:rebuildBody(np)});}}/>
            : part.type==='link'
            ? (() => {
                const linkUrl = safeHttpUrl(part.url);
                return <div key={i} style={{display:'flex',alignItems:'center',gap:8,background:'#17171b',border:'1px solid #1f1f24',borderRadius:8,padding:'7px 10px',margin:'4px 0',transition:'border-color 120ms'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='#2a2a31'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='#1f1f24'}>
                <svg style={{width:12,height:12,color:'#818cf8',flexShrink:0}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                {linkUrl
                  ? <a href={linkUrl} target="_blank" rel="noopener noreferrer"
                      style={{flex:1,color:'#818cf8',fontSize:13,textDecoration:'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'Manrope,sans-serif'}}
                      onMouseEnter={e=>e.currentTarget.style.textDecoration='underline'}
                      onMouseLeave={e=>e.currentTarget.style.textDecoration='none'}>
                      {part.title}
                    </a>
                  : <span style={{flex:1,color:'#9a9788',fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'Manrope,sans-serif'}}>{part.title} (blocked URL)</span>
                }
                <span style={{fontSize:11,color:'#3a3a44',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160,flexShrink:0}}>
                  {linkUrl ? (()=>{try{return new URL(linkUrl).hostname;}catch{return '';}})() : ''}
                </span>
                <button onClick={()=>{const np=[...bodyParts];np.splice(i,1);upNote({body:rebuildBody(np)});}} className="del-btn" style={{padding:'2px 4px',flexShrink:0}} title="Remove link">
                  <svg style={{width:11,height:11}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>;
              })()
            : part.type==='image'
            ? (() => {
                const img = (note.images||[]).find(x=>x.id===part.id);
                const imgSrc = img ? safeImageSrc(img.src) : null;
                if (!img) return null;
                return <div key={i} style={{margin:'8px 0',background:'#17171b',borderRadius:10,overflow:'hidden',border:'1px solid #1f1f24',maxWidth:'100%',position:'relative',display:'inline-block',width:'100%'}}>
                  {imgSrc && <img src={imgSrc} alt={img.alt} style={{display:'block',maxWidth:'100%',maxHeight:320,objectFit:'contain'}}/>}
                  <button onClick={()=>{
                    const np=[...bodyParts]; np.splice(i,1);
                    upNote({body:rebuildBody(np), images:(note.images||[]).filter(x=>x.id!==img.id)});
                  }} style={{position:'absolute',top:6,right:6,background:'rgba(0,0,0,.75)',border:'none',borderRadius:5,color:'#fff',cursor:'pointer',width:22,height:22,fontSize:13,lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                  <input value={img.caption||''} onChange={e=>upNote({images:(note.images||[]).map(x=>x.id===img.id?{...x,caption:e.target.value}:x)})}
                    placeholder="Add caption…" style={{display:'block',width:'100%',background:'transparent',border:'none',borderTop:'1px solid #1f1f24',color:'#9a9788',fontSize:11.5,padding:'6px 10px',outline:'none',boxSizing:'border-box'}}/>
                </div>;
              })()
            : previewMode
            ? <MarkdownView key={i} content={part.content} onCheckboxToggle={idx=>handleCheckboxToggle(i,idx)}/>
            : <textarea key={i} className="editor-body" value={part.content}
                rows={Math.max(5,(part.content.match(/\n/g)||[]).length+2)}
                onFocus={e=>{ activeTA.current={el:e.target,partIdx:i,pos:e.target.selectionStart}; }}
                onBlur={e=>{ if(activeTA.current?.el===e.target) activeTA.current.pos=e.target.selectionStart; }}
                onSelect={e=>{ if(activeTA.current?.el===e.target) activeTA.current.pos=e.target.selectionStart; }}
                onChange={e=>handleBodyChange(e,i)}
                onKeyDown={e=>handleBodyKeyDown(e,i)}
                placeholder={i===0?'Start writing… (click toolbar buttons to format)':part.content===''?'Continue writing…':''}/>
        )}

        {/* code insert panel */}
        {showCode && (
          <div style={{marginTop:16,background:'#17171b',border:'1px solid #2a2a31',borderRadius:10,padding:'14px 16px'}}>
            <div style={{fontSize:11,color:'#9a9788',marginBottom:8}}>Insert code snippet:</div>
            <CodeBlock value={codeVal} lang={codeLang} onChange={setCodeVal} onLangChange={setCodeLang}/>
            <div style={{display:'flex',gap:8,marginTop:10}}>
              <button className="btn-primary" onClick={insertCode} style={{fontSize:12,padding:'5px 12px'}}>Insert</button>
              <button className="btn-ghost" onClick={()=>setShowCode(false)} style={{fontSize:12,padding:'5px 12px'}}>Cancel</button>
            </div>
          </div>
        )}

        {/* web links */}
        {(note.webLinks||[]).length>0 && (
          <div style={{marginTop:20}}>
            <div style={{fontSize:11,color:'#3a3a44',marginBottom:8,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Links</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {(note.webLinks||[]).map(l=>{
                const linkUrl = safeHttpUrl(l.url);
                return <div key={l.id} style={{display:'flex',alignItems:'center',gap:8,background:'#17171b',border:'1px solid #1f1f24',borderRadius:8,padding:'7px 10px',transition:'border-color 120ms'}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor='#2a2a31'}
                  onMouseLeave={e=>e.currentTarget.style.borderColor='#1f1f24'}>
                  <svg style={{width:12,height:12,color:'#818cf8',flexShrink:0}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                  {linkUrl
                    ? <a href={linkUrl} target="_blank" rel="noopener noreferrer"
                        style={{flex:1,color:'#818cf8',fontSize:13,textDecoration:'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'Manrope,sans-serif'}}
                        onMouseEnter={e=>e.currentTarget.style.textDecoration='underline'}
                        onMouseLeave={e=>e.currentTarget.style.textDecoration='none'}>
                        {l.title}
                      </a>
                    : <span style={{flex:1,color:'#9a9788',fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'Manrope,sans-serif'}}>{l.title} (blocked URL)</span>
                  }
                  <span style={{fontSize:11,color:'#3a3a44',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160,flexShrink:0}}>
                    {linkUrl ? (() => { try { return new URL(linkUrl).hostname; } catch { return ''; } })() : ''}
                  </span>
                  <button onClick={()=>removeWebLink(l.id)} className="del-btn" style={{padding:'2px 4px',flexShrink:0}} title="Remove link">
                    <svg style={{width:11,height:11}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>;
              })}
            </div>
          </div>
        )}

        {/* legacy images not yet placed inline */}
        {(()=>{
          const inlineIds = new Set(bodyParts.filter(p=>p.type==='image').map(p=>p.id));
          const orphans = (note.images||[]).filter(img=>!inlineIds.has(img.id));
          if (!orphans.length) return null;
          return <div style={{marginTop:20}}>
            <div style={{fontSize:11,color:'#3a3a44',marginBottom:10,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Images</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:14}}>
              {orphans.map(img=>{
                const imgSrc = safeImageSrc(img.src);
                return <div key={img.id} style={{position:'relative',maxWidth:'100%',background:'#17171b',borderRadius:10,overflow:'hidden',border:'1px solid #1f1f24'}}>
                  {imgSrc && <img src={imgSrc} alt={img.alt} style={{display:'block',maxWidth:'100%',maxHeight:280,objectFit:'contain'}}/>}
                  <button onClick={()=>upNote({images:(note.images||[]).filter(x=>x.id!==img.id)})}
                    style={{position:'absolute',top:6,right:6,background:'rgba(0,0,0,.75)',border:'none',borderRadius:5,color:'#fff',cursor:'pointer',width:22,height:22,fontSize:13,lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                  <input value={img.caption||''} onChange={e=>upNote({images:(note.images||[]).map(x=>x.id===img.id?{...x,caption:e.target.value}:x)})}
                    placeholder="Add caption…" style={{display:'block',width:'100%',background:'transparent',border:'none',borderTop:'1px solid #1f1f24',color:'#9a9788',fontSize:11.5,padding:'6px 10px',outline:'none'}}/>
                </div>;
              })}
            </div>
          </div>;
        })()}
      </div>

      {/* ── linked notes bar ── */}
      {linkedNotes.length>0 && (
        <div style={{padding:'8px 32px',borderTop:'1px solid #1f1f24',display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',flexShrink:0}}>
          <span style={{fontSize:11,color:'#3a3a44',flexShrink:0}}>Linked:</span>
          {linkedNotes.map(n=>(
            <span key={n.id}
              style={{display:'inline-flex',alignItems:'center',gap:5,background:'#17171b',border:'1px solid #1f1f24',borderRadius:6,padding:'2px 8px',fontSize:12,cursor:'pointer',transition:'border-color 110ms'}}
              onClick={()=>update('ui',{...state.ui,noteId:n.id})}
              onMouseEnter={e=>e.currentTarget.style.borderColor='#818cf8'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='#1f1f24'}>
              <span style={{fontSize:12}}>{n.emoji||'📝'}</span>
              <span style={{color:'#c9c6b8'}}>{n.title||'Untitled'}</span>
              <span onClick={e=>{e.stopPropagation();removeLink(n.id);}} className="del-btn" style={{marginLeft:2,padding:'0 2px',fontSize:13,lineHeight:1}}>×</span>
            </span>
          ))}
        </div>
      )}

      {/* ── footer ── */}
      <div style={{padding:'8px 32px',borderTop:'1px solid #1f1f24',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <span style={{fontSize:11,color:'#3a3a44',display:'flex',flexDirection:'column',gap:1}}>
          {note.created&&<span>Created <span style={{color:'#9a9788'}}>{new Date(note.created).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span></span>}
          <span>Updated <span style={{color:'#9a9788'}}>{new Date(note.updated).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span></span>
        </span>
        <button onClick={()=>{
            if(confirm('Delete this note?')){
              const id = note.id;
              update('notes', prev => (prev||state.notes).filter(n=>n.id!==id));
              update('ui', {...state.ui, noteId:null});
            }
          }}
          className="del-btn" style={{fontSize:12,gap:5}}>
          <svg style={{width:13,height:13}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg> Delete note
        </button>
      </div>
    </div>
  );
}

/* ── NotesView ── */
function NotesView({ state, update, isMobile }) {
  const [search, setSearch] = useState('');
  const [listWidth, setListWidth] = useState(280);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [ctxMenu, setCtxMenu] = useState(null);
  const [dateFilter, setDateFilter] = useState(null); // 'YYYY-MM-DD' or null
  const [showCal, setShowCal] = useState(false);
  const [favOnly, setFavOnly] = useState(false);
  const filterTag = state.ui.filterTag || '';
  const filterFolder = state.ui.folderId || null;
  const setFilterTag = t => update('ui',{...state.ui,filterTag:t});
  const noteId = state.ui.noteId;

  const filtered = useMemo(() => state.notes.filter(n => {
    const q = search.toLowerCase();
    const dateStr = n.created ? new Date(n.created).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}).toLowerCase() : '';
    const matchQ = !q || n.title.toLowerCase().includes(q) || (n.body||'').toLowerCase().includes(q) || dateStr.includes(q);
    const matchT = !filterTag || n.tags.includes(filterTag);
    const matchF = !filterFolder || n.folderId === filterFolder;
    const matchD = !dateFilter || (n.created && fmtKey(new Date(n.created)) === dateFilter);
    const matchFav = !favOnly || n.pinned;
    return matchQ && matchT && matchF && matchD && matchFav;
  }), [state.notes, search, filterTag, filterFolder, dateFilter, favOnly]);

  const grouped = useMemo(() => {
    const today = todayKey();
    const yesterday = fmtKey(new Date(Date.now() - 86400000));
    const byKey = {};
    [...filtered].sort((a,b)=>(b.created||0)-(a.created||0)).forEach(n => {
      const key = n.created ? fmtKey(new Date(n.created)) : '0000-00-00';
      const label = key === today ? 'Today' : key === yesterday ? 'Yesterday' :
        (n.created ? new Date(n.created).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'Unknown');
      if (!byKey[key]) byKey[key] = { label, items:[] };
      byKey[key].items.push(n);
    });
    return Object.entries(byKey).sort(([a],[b])=>b.localeCompare(a)).map(([,v])=>v);
  }, [filtered]);

  const newNote = () => {
    const n = { id:uid(), emoji:'📝', title:'', body:'', tags:[], links:[], images:[], folderId: filterFolder||null, created:Date.now(), updated:Date.now() };
    update('notes', [n, ...state.notes]);
    update('ui', {...state.ui, noteId:n.id});
  };

  const togglePin = (e, id) => {
    e.stopPropagation();
    update('notes', state.notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n));
  };
  const deleteNote = id => {
    update('notes', state.notes.filter(n=>n.id!==id));
    if (noteId===id) update('ui',{...state.ui,noteId:null});
    setSelectedIds(prev=>{ const s=new Set(prev); s.delete(id); return s; });
  };
  const toggleSelect = (e, id) => {
    e.stopPropagation();
    setSelectedIds(prev=>{ const s=new Set(prev); s.has(id)?s.delete(id):s.add(id); return s; });
  };
  const deleteSelected = () => {
    update('notes', state.notes.filter(n=>!selectedIds.has(n.id)));
    if (selectedIds.has(noteId)) update('ui',{...state.ui,noteId:null});
    setSelectedIds(new Set());
  };
  const selectAll = () => setSelectedIds(new Set(filtered.map(n=>n.id)));
  const clearSel  = () => setSelectedIds(new Set());

  const selectedNote = state.notes.find(n=>n.id===noteId);
  const allTags = [...new Set(state.notes.flatMap(n=>n.tags))];

  /* Mobile: full-screen editor with back button */
  if (isMobile && noteId && selectedNote) {
    return (
      <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
        <div style={{padding:'10px 14px',borderBottom:'1px solid #1f1f24',display:'flex',alignItems:'center',flexShrink:0}}>
          <button onClick={()=>update('ui',{...state.ui,noteId:null})}
            style={{background:'none',border:'none',color:'#818cf8',cursor:'pointer',fontSize:14,fontFamily:'Manrope,sans-serif',fontWeight:600,display:'flex',alignItems:'center',gap:5,padding:0}}>
            <svg style={{width:16,height:16}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            Notes
          </button>
        </div>
        <NoteEditor note={selectedNote} state={state} update={update} isMobile={isMobile}/>
      </div>
    );
  }

  const listPanel = (
    <div style={{
      width: isMobile ? '100%' : listWidth,
      minWidth: isMobile ? 0 : 160,
      borderRight: isMobile ? 'none' : '1px solid #1f1f24',
      display:'flex', flexDirection:'column', overflow:'hidden',
      flex: isMobile ? 1 : 'none',
    }}>
      <div style={{padding:'16px 14px 10px',flexShrink:0}}>
        <div style={{display:'flex',gap:8,marginBottom:dateFilter?6:10}}>
          <input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search notes…" style={{flex:1}}/>
          {/* calendar date-filter button */}
          <div style={{position:'relative',flexShrink:0}}>
            <button onClick={()=>setShowCal(v=>!v)} title="Filter by date"
              style={{background:showCal||dateFilter?'#818cf8':'#17171b',border:`1px solid ${showCal||dateFilter?'#818cf8':'#1f1f24'}`,borderRadius:8,padding:'8px 10px',cursor:'pointer',display:'flex',alignItems:'center',transition:'all 120ms'}}>
              <svg style={{width:15,height:15,color:showCal||dateFilter?'#fff':'#9a9788'}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </button>
            {showCal&&<MiniCalendar value={dateFilter} onChange={d=>{setDateFilter(d);setShowCal(false);}} onClose={()=>setShowCal(false)}/>}
          </div>
          {/* favourites-only toggle */}
          <button onClick={()=>setFavOnly(v=>!v)} title={favOnly?'Show all notes':'Show favourites only'}
            style={{background:favOnly?'#f59e0b':'#17171b',border:`1px solid ${favOnly?'#f59e0b':'#1f1f24'}`,borderRadius:8,padding:'8px 10px',cursor:'pointer',display:'flex',alignItems:'center',flexShrink:0,transition:'all 120ms'}}>
            <svg style={{width:15,height:15,color:favOnly?'#fff':'#9a9788'}} viewBox="0 0 24 24" fill={favOnly?'currentColor':'none'} stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </button>
          <button className="btn-primary" onClick={newNote} style={{padding:'8px 12px',display:'flex',alignItems:'center'}}>
            {React.cloneElement(Ic.plus,{style:{width:15,height:15}})}
          </button>
        </div>
        {favOnly&&(
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,padding:'5px 8px',background:'#f59e0b15',border:'1px solid #f59e0b30',borderRadius:7}}>
            <svg style={{width:11,height:11,color:'#f59e0b',flexShrink:0}} viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <span style={{fontSize:11,color:'#f59e0b',flex:1}}>Favourites only</span>
            <button onClick={()=>setFavOnly(false)} style={{background:'none',border:'none',color:'#f59e0b',cursor:'pointer',fontSize:14,lineHeight:1,padding:'0 2px'}}>×</button>
          </div>
        )}
        {dateFilter&&(
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,padding:'5px 8px',background:'#818cf815',border:'1px solid #818cf830',borderRadius:7}}>
            <svg style={{width:11,height:11,color:'#818cf8',flexShrink:0}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span style={{fontSize:11,color:'#818cf8',flex:1}}>
              {dateFilter===todayKey()?'Today':new Date(dateFilter+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
            </span>
            <button onClick={()=>setDateFilter(null)} style={{background:'none',border:'none',color:'#818cf8',cursor:'pointer',fontSize:14,lineHeight:1,padding:'0 2px'}}>×</button>
          </div>
        )}
        <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
          <span onClick={()=>setFilterTag('')} className="tag" style={{background:filterTag===''?'#818cf830':'none',color:filterTag===''?'#818cf8':'#9a9788',border:'1px solid #1f1f24',cursor:'pointer'}}>All</span>
          {allTags.map(t=>(
            <span key={t} onClick={()=>setFilterTag(filterTag===t?'':t)} className="tag"
              style={{background:filterTag===t?`${tagColor(t)}20`:'none',color:filterTag===t?tagColor(t):'#9a9788',border:'1px solid #1f1f24',cursor:'pointer'}}>
              {t}
            </span>
          ))}
        </div>
      </div>
      <div style={{flex:1,overflow:'auto',padding:'0 10px 10px'}} className="scrollbar">
        {filtered.length===0 && <div style={{color:'#3a3a44',fontSize:13,padding:'20px 4px'}}>No notes found.</div>}
        {grouped.map(g=>(
          <div key={g.label}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'.07em',color:'#3a3a44',textTransform:'uppercase',padding:'10px 4px 6px'}}>{g.label}</div>
            {g.items.map(n=>{
              const folder = (state.folders||[]).find(f=>f.id===n.folderId);
              const checked = selectedIds.has(n.id);
              return (
                <div key={n.id}
                  className={`note-card card fadeUp ${noteId===n.id&&!checked?'sel':''} ${checked?'checked':''}`}
                  style={{marginBottom:8}}
                  onClick={()=>{ if(checked){toggleSelect({stopPropagation:()=>{}},n.id);}else{update('ui',{...state.ui,noteId:n.id});} }}
                  onContextMenu={e=>{e.preventDefault();setCtxMenu({x:e.clientX,y:e.clientY,id:n.id});}}>
                  {/* pin/favourite button — visible on hover, or always if pinned */}
                  <button className={`note-pin${n.pinned?' on':''}`} onClick={e=>togglePin(e,n.id)} title={n.pinned?'Unpin note':'Pin note'}>
                    <svg style={{width:12,height:12}} viewBox="0 0 24 24" fill={n.pinned?'currentColor':'none'} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                  </button>
                  {/* trash button — visible on hover */}
                  <button className="note-del" onClick={e=>{e.stopPropagation();deleteNote(n.id);}} title="Delete note">
                    <svg style={{width:12,height:12}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                  </button>
                  <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:5,paddingRight:56}}>
                    {/* select checkbox */}
                    <span className={`note-cb tick${checked?' on':''}`} onClick={e=>toggleSelect(e,n.id)} style={{width:15,height:15,borderRadius:4,flexShrink:0}}>
                      {checked&&<svg style={{width:8,height:8}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
                    </span>
                    <span style={{fontSize:16,flexShrink:0}}>{n.emoji||'📝'}</span>
                    <span style={{fontSize:13,fontWeight:600,color:'#f4f3ee',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{n.title||'Untitled'}</span>
                    {folder&&!filterFolder&&<span style={{fontSize:10,color:'#818cf8',flexShrink:0,maxWidth:54,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>📁{folder.name}</span>}
                  </div>
                  <div style={{fontSize:12,color:'#9a9788',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',lineHeight:1.5,marginBottom:6,wordBreak:'break-word'}}>
                    {(n.body||'').replace(/```[\s\S]*?```/g,'[code]').slice(0,120)}
                  </div>
                  {n.tags.length>0&&(
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {n.tags.slice(0,3).map(t=>(
                        <span key={t} className="tag" style={{background:`${tagColor(t)}15`,color:tagColor(t),fontSize:10}}>{t}</span>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
        {/* bulk action bar */}
        {selectedIds.size>0&&(
          <div className="bulk-bar">
            <span style={{fontSize:12,color:'#9a9788',flex:1}}>{selectedIds.size} selected</span>
            <button onClick={selectAll} style={{background:'none',border:'1px solid #2a2a31',borderRadius:6,color:'#9a9788',fontSize:12,padding:'4px 10px',cursor:'pointer',fontFamily:'Manrope,sans-serif'}}>All</button>
            <button onClick={clearSel}  style={{background:'none',border:'1px solid #2a2a31',borderRadius:6,color:'#9a9788',fontSize:12,padding:'4px 10px',cursor:'pointer',fontFamily:'Manrope,sans-serif'}}>Clear</button>
            <button onClick={deleteSelected} className="del-btn" style={{border:'1px solid rgba(244,63,94,.3)',borderRadius:6,padding:'4px 12px',fontSize:12,gap:5,fontFamily:'Manrope,sans-serif',fontWeight:600,color:'#f43f5e',background:'rgba(244,63,94,.08)'}}>
              <svg style={{width:13,height:13}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
              Delete {selectedIds.size}
            </button>
          </div>
        )}
        {/* right-click context menu */}
        {ctxMenu&&(
          <ContextMenu x={ctxMenu.x} y={ctxMenu.y} onClose={()=>setCtxMenu(null)} items={[
            {label:'Select', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:13,height:13}}><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
              fn:()=>setSelectedIds(prev=>{const s=new Set(prev);s.add(ctxMenu.id);return s;})},
            'sep',
            {label:'Delete note', danger:true, icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:13,height:13}}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>,
              fn:()=>deleteNote(ctxMenu.id)},
          ]}/>
        )}
      </div>
    </div>
  );

  if (isMobile) {
    return <div style={{display:'flex',height:'100%',overflow:'hidden'}}>{listPanel}</div>;
  }

  return (
    <div style={{display:'flex',height:'100%',overflow:'hidden'}}>
      {listPanel}
      {/* drag-to-resize handle */}
      <div className="resize-handle"
        onMouseDown={e => {
          const startX = e.clientX, startW = listWidth;
          const onMove = mv => setListWidth(Math.max(160, Math.min(500, startW + mv.clientX - startX)));
          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
          };
          document.body.style.cursor = 'col-resize';
          document.body.style.userSelect = 'none';
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
          e.preventDefault();
        }}
      />
      <NoteEditor note={selectedNote} state={state} update={update} isMobile={isMobile}/>
    </div>
  );
}

/* ── TasksView ── */
function TasksView({ state, update, isMobile, pom, setPom }) {
  const [newTitle, setNewTitle] = useState('');
  const [newPrio, setNewPrio] = useState('medium');
  const [newDue, setNewDue] = useState('');
  const [expanded, setExpanded] = useState({});
  const [subInput, setSubInput] = useState({});
  const [editing, setEditing] = useState(null);
  const [editingSub, setEditingSub] = useState(null);
  const [selectedTaskIds, setSelectedTaskIds] = useState(new Set());
  const [ctxMenu, setCtxMenu] = useState(null);
  const [tagFilter, setTagFilter] = useState('');
  const [editTagInput, setEditTagInput] = useState('');

  const toggleTask = id => update('tasks', state.tasks.map(t=>t.id===id?{...t,done:!t.done}:t));
  const toggleSub = (tid,sid) => update('tasks', state.tasks.map(t=>t.id===tid?{...t,subtasks:t.subtasks.map(s=>s.id===sid?{...s,done:!s.done}:s)}:t));
  const delTask = id => { update('tasks', state.tasks.filter(t=>t.id!==id)); setSelectedTaskIds(p=>{const s=new Set(p);s.delete(id);return s;}); };
  const toggleTaskSel = (e,id) => { e.stopPropagation(); setSelectedTaskIds(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;}); };
  const deleteSelectedTasks = () => { update('tasks',state.tasks.filter(t=>!selectedTaskIds.has(t.id))); setSelectedTaskIds(new Set()); };
  const addTaskTag = (id, tag) => {
    const c=tag.startsWith('#')?tag:'#'+tag;
    update('tasks',state.tasks.map(t=>t.id===id&&!(t.tags||[]).includes(c)?{...t,tags:[...(t.tags||[]),c]}:t));
    if (!state.tags.includes(c)) update('tags',[...state.tags,c]);
  };
  const removeTaskTag = (id, tag) => update('tasks',state.tasks.map(t=>t.id===id?{...t,tags:(t.tags||[]).filter(tg=>tg!==tag)}:t));

  const addTask = e => {
    e.preventDefault();
    if(!newTitle.trim()) return;
    update('tasks',[{id:uid(),title:newTitle,done:false,priority:newPrio,due:newDue,tags:[],subtasks:[],kanbanCol:'todo',created:Date.now()},...state.tasks]);
    setNewTitle(''); setNewDue(''); setNewPrio('medium');
  };
  const cancelAdd = () => { setNewTitle(''); setNewDue(''); setNewPrio('medium'); };
  const addSub = (tid) => {
    const v = subInput[tid]||'';
    if(!v.trim()) return;
    update('tasks',state.tasks.map(t=>t.id===tid?{...t,subtasks:[...t.subtasks,{id:uid(),title:v,done:false}]}:t));
    setSubInput({...subInput,[tid]:''});
  };
  const startEdit = t => setEditing({ id:t.id, title:t.title, priority:t.priority||'medium', due:t.due||'', tags:t.tags||[], timeBlock:t.timeBlock??'', pomWork:t.pomWork??25, pomBreak:t.pomBreak??5 });
  const saveEdit = e => {
    e.preventDefault();
    if(!editing.title.trim()) return;
    update('tasks', state.tasks.map(t=>t.id===editing.id?{...t,title:editing.title,priority:editing.priority,due:editing.due,tags:editing.tags||[],timeBlock:editing.timeBlock?Number(editing.timeBlock):null,pomWork:Number(editing.pomWork)||25,pomBreak:Number(editing.pomBreak)||5}:t));
    const newTags = (editing.tags||[]).filter(tg=>!state.tags.includes(tg));
    if (newTags.length) update('tags',[...state.tags,...newTags]);
    setEditing(null);
    setEditTagInput('');
  };
  const startEditSub = (tid,s) => setEditingSub({ tid, sid:s.id, title:s.title });
  const saveEditSub = e => {
    e.preventDefault();
    if(!editingSub.title.trim()) return;
    update('tasks', state.tasks.map(t=>t.id===editingSub.tid?{...t,subtasks:t.subtasks.map(s=>s.id===editingSub.sid?{...s,title:editingSub.title}:s)}:t));
    setEditingSub(null);
  };
  const delSub = (tid,sid) => update('tasks', state.tasks.map(t=>t.id===tid?{...t,subtasks:t.subtasks.filter(s=>s.id!==sid)}:t));

  const PRIO_ORDER = { high:0, medium:1, low:2, none:3 };
  const byPrio = arr => [...arr].sort((a,b)=>(PRIO_ORDER[a.priority||'none']??3)-(PRIO_ORDER[b.priority||'none']??3));
  const taskFilter = t => !tagFilter || (t.tags||[]).includes(tagFilter);
  const allTaskTags = [...new Set(state.tasks.flatMap(t=>t.tags||[]))];

  const groups = [
    { label:'Today',    items: byPrio(state.tasks.filter(t=>!t.done&&t.due===todayKey()&&taskFilter(t))) },
    { label:'Upcoming', items: byPrio(state.tasks.filter(t=>!t.done&&t.due&&t.due!==todayKey()&&taskFilter(t))) },
    { label:'No date',  items: byPrio(state.tasks.filter(t=>!t.done&&!t.due&&taskFilter(t))) },
    { label:'Done',     items: state.tasks.filter(t=>t.done&&taskFilter(t)) },
  ];
  const visibleIds = groups.flatMap(g=>g.items.map(t=>t.id));
  const allVisibleSelected = visibleIds.length>0 && visibleIds.every(id=>selectedTaskIds.has(id));
  const toggleSelectAll = () => setSelectedTaskIds(allVisibleSelected ? new Set() : new Set(visibleIds));

  return (
    <div style={{flex:1,overflow:'auto',padding:isMobile?'20px 14px':'28px 32px'}} className="scrollbar">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:allTaskTags.length?10:20}}>
        <h1 style={{fontFamily:'Fraunces,serif',fontSize:isMobile?22:26,fontWeight:600}}>Tasks</h1>
        {visibleIds.length>0&&(
          <button onClick={toggleSelectAll}
            style={{background:'none',border:'1px solid #1f1f24',borderRadius:7,color:allVisibleSelected?'#818cf8':'#9a9788',padding:'5px 10px',cursor:'pointer',fontSize:isMobile?11:12,flexShrink:0}}>
            {allVisibleSelected?'Deselect all':'Select all'}
          </button>
        )}
      </div>
      {allTaskTags.length>0&&(
        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:18}}>
          <span onClick={()=>setTagFilter('')} className="tag" style={{background:tagFilter===''?'#818cf830':'none',color:tagFilter===''?'#818cf8':'#9a9788',border:'1px solid #1f1f24',cursor:'pointer',fontSize:11}}>All</span>
          {allTaskTags.map(tg=>(
            <span key={tg} onClick={()=>setTagFilter(tagFilter===tg?'':tg)} className="tag"
              style={{background:tagFilter===tg?`${tagColor(tg)}20`:'none',color:tagFilter===tg?tagColor(tg):'#9a9788',border:'1px solid #1f1f24',cursor:'pointer',fontSize:11}}>
              {tg}
            </span>
          ))}
        </div>
      )}

      {/* add task */}
      <form onSubmit={addTask} style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:24,background:'#131317',border:'1px solid #1f1f24',borderRadius:10,padding:'10px 14px'}}>
        <input className="input" value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="New task…" style={{flex:'1 1 160px',minWidth:0,background:'transparent',border:'none',padding:0,fontSize:14}}/>
        <div style={{display:'flex',gap:8,flexShrink:0,flexWrap:'wrap',...(isMobile?{width:'100%'}:{})}}>
          <select value={newPrio} onChange={e=>setNewPrio(e.target.value)} style={{background:'#17171b',border:'1px solid #2a2a31',borderRadius:6,color:PRIO[newPrio],fontSize:12,padding:'4px 8px'}}>
            {Object.keys(PRIO).map(p=><option key={p} value={p}>{p}</option>)}
          </select>
