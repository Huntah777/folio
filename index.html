/* ── CalendarView ── */
const BLANK_FORM = { title:'', time:'09:00', duration:30, attendees:'', recurrence:'none', recurrenceDays:[], recurrenceEnd:'' };

function occursOnDay(m, d) {
  const key = fmtKey(d);
  if (m.exceptionDate) return m.exceptionDate === key;     /* single edited occurrence */
  if (key < m.date) return false;
  if (m.recurrenceEnd && key > m.recurrenceEnd) return false;
  if ((m.exceptions||[]).includes(key)) return false;      /* overridden occurrence */
  if (m.date === key) return true;
  const r = m.recurrence || 'none';
  if (r === 'none')    return false;
  if (r === 'daily')   return true;
  if (r === 'weekly')  return (m.recurrenceDays||[]).includes(d.getDay());
  if (r === 'monthly') return d.getDate() === parseKey(m.date).getDate();
  return false;
}

function recurLabel(m) {
  if (!m.recurrence || m.recurrence === 'none') return null;
  if (m.recurrence === 'daily')   return 'Daily';
  if (m.recurrence === 'monthly') return 'Monthly';
  if (m.recurrence === 'weekly') {
    const names = (m.recurrenceDays||[]).sort().map(i=>DAY_SHORT[i]);
    return names.length ? names.join(', ') : 'Weekly';
  }
  return null;
}

function CalendarView({ state, update, isMobile }) {
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState(BLANK_FORM);
  const [panelWidth, setPanelWidth] = useState(310);
  const [notifPerm, setNotifPerm] = useState(() =>
    ('Notification' in window) ? Notification.permission : 'denied'
  );
  const [pushActive, setPushActive] = useState(false);
  const [pushToast,  setPushToast]  = useState(null); /* null | 'active' | 'foreground' */
  const [editModal,  setEditModal]  = useState(null);
  const [editForm,   setEditForm]   = useState(BLANK_FORM);
  const [editScope,  setEditScope]  = useState('all');
  const [confirmDel, setConfirmDel] = useState(null);
  const [nowTick, setNowTick] = useState(Date.now());

  useEffect(() => {
    if (notifPerm !== 'granted' || !('serviceWorker' in navigator)) {
      setPushActive(false); return;
    }
    navigator.serviceWorker.ready
      .then(reg => reg.pushManager.getSubscription())
      .then(sub => setPushActive(!!sub))
      .catch(() => setPushActive(false));
  }, [notifPerm]);

  const requestNotifPerm = async () => {
    if (!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    setNotifPerm(perm);
    if (perm !== 'granted') return;
    scheduleNotifications(state.meetings, state.salah);
    const ok = await activatePush();
    if (ok) setPushActive(true);
    setPushToast(ok ? 'active' : 'foreground');
    setTimeout(() => setPushToast(null), 5000);
  };

  const calDate = state.ui.calDate ? parseKey(state.ui.calDate) : new Date();
  const selDate = state.ui.calDate || todayKey();
  const selSalahTimes = useSalahTimes(selDate, state.salah);

  const year = calDate.getFullYear(), month = calDate.getMonth();
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const today = todayKey();
  const isToday = selDate === today;

  useEffect(() => {
    if (!isToday) return;
    const id = setInterval(() => setNowTick(Date.now()), 30000);
    return () => clearInterval(id);
  }, [isToday]);

  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(new Date(year,month,d));

  const meetingsOnDay = d => state.meetings.filter(m => occursOnDay(m, d));
  const selDayMeetings = meetingsOnDay(parseKey(selDate)).sort((a,b)=>a.time.localeCompare(b.time));

  const nav = dir => { const d=new Date(year,month+dir,1); update('ui',{...state.ui,calDate:fmtKey(d)}); };

  const resetForm = () => {
    /* default weekly days to the day-of-week of the selected date */
    setForm({...BLANK_FORM, recurrenceDays:[parseKey(selDate).getDay()]});
  };
  const openModal = () => { resetForm(); setShowModal(true); };

  const addMeeting = e => {
    e.preventDefault();
    if(!form.title.trim()) return;
    const m = {
      id: uid(),
      title: form.title, time: form.time, duration: form.duration,
      attendees: form.attendees, date: selDate, noteId: '',
      recurrence: form.recurrence,
      recurrenceDays: form.recurrence==='weekly' ? form.recurrenceDays : [],
      recurrenceEnd: form.recurrence!=='none' ? form.recurrenceEnd : '',
    };
    update('meetings',[...state.meetings, m]);
    setShowModal(false);
  };

  const openMeetingNote = m => {
    const recLine = recurLabel(m) ? `\n**Recurrence:** ${recurLabel(m)}${m.recurrenceEnd?' until '+m.recurrenceEnd:''}` : '';
    const body = `## Attendees\n${m.attendees||'—'}\n\n## Agenda\n- \n\n## Notes\n\n## Action Items\n- [ ] ${recLine}`;
    const n = { id:uid(), emoji:'🗓', title:`${m.title} — ${selDate}`, body, tags:['#meeting'], links:[], images:[], created:Date.now(), updated:Date.now() };
    update('notes',[n,...state.notes]);
    update('meetings',state.meetings.map(x=>x.id===m.id?{...x,noteId:n.id}:x));
    update('ui',{...state.ui,view:'notes',noteId:n.id});
  };

  const openEditMeeting = m => {
    setEditModal(m);
    setEditScope('all');
    setEditForm({
      title:m.title, time:m.time, duration:m.duration, attendees:m.attendees||'',
      recurrence:m.recurrence||'none', recurrenceDays:m.recurrenceDays||[],
      recurrenceEnd:m.recurrenceEnd||'',
    });
  };

  const submitEditMeeting = e => {
    e.preventDefault();
    if (!editForm.title.trim()) return;
    const m = editModal;
    const isRecurring = m.recurrence && m.recurrence !== 'none';
    const updates = {
      title:editForm.title, time:editForm.time, duration:editForm.duration,
      attendees:editForm.attendees,
      recurrence:editForm.recurrence,
      recurrenceDays:editForm.recurrence==='weekly'?editForm.recurrenceDays:[],
      recurrenceEnd:editForm.recurrence!=='none'?editForm.recurrenceEnd:'',
    };
    if (isRecurring && editScope==='one' && !m.exceptionDate) {
      const exception = {...m,...updates, id:uid(), exceptionDate:selDate, editedFrom:m.editedFrom||m.id, recurrence:'none', recurrenceDays:[], recurrenceEnd:''};
      const origId = m.editedFrom || m.id;
      const updated = state.meetings.map(x=>x.id===origId?{...x,exceptions:[...(x.exceptions||[]),selDate]}:x);
      update('meetings',[...updated, exception]);
    } else {
      update('meetings', state.meetings.map(x=>x.id===m.id?{...x,...updates}:x));
    }
    setEditModal(null);
  };

  const handleDeleteClick = m => {
    const isRecurring = (m.recurrence && m.recurrence !== 'none') || m.exceptionDate;
    if (!isRecurring) {
      if (confirm(`Delete "${m.title}"?`)) update('meetings', state.meetings.filter(x=>x.id!==m.id));
      return;
    }
    setConfirmDel(m.id === confirmDel ? null : m.id);
  };

  const doDeleteOne = m => {
    if (m.exceptionDate) {
      update('meetings', state.meetings.filter(x=>x.id!==m.id));
    } else {
      update('meetings', state.meetings.map(x=>x.id===m.id?{...x,exceptions:[...(x.exceptions||[]),selDate]}:x));
    }
    setConfirmDel(null);
  };

  const doDeleteAll = m => {
    const origId = m.editedFrom || m.id;
    update('meetings', state.meetings.filter(x=>x.id!==origId && x.editedFrom!==origId));
    setConfirmDel(null);
  };

  /* toolbar toggle style helper */
  const tog = active => ({
    flex:1, padding:'6px 4px', borderRadius:6, fontSize:11.5, fontWeight:600,
    cursor:'pointer', border:'1px solid', transition:'all 110ms',
    background: active ? '#818cf8' : 'transparent',
    borderColor: active ? '#818cf8' : '#1f1f24',
    color: active ? '#fff' : '#9a9788',
  });

  return (
    <div style={{display:'flex',flex:1,overflow:'hidden',flexDirection:isMobile?'column':'row'}}>

      {/* ── month grid ── */}
      <div style={{flex:1,padding:isMobile?'10px 6px':'24px 24px 24px 40px',overflow:isMobile?'visible':'auto',minWidth:0}} className={isMobile?undefined:'scrollbar'}>
        <div style={{display:'flex',alignItems:'center',gap:isMobile?6:16,marginBottom:isMobile?10:20,flexWrap:isMobile?'wrap':'nowrap'}}>
          <button onClick={()=>nav(-1)} style={{background:'none',border:'1px solid #1f1f24',borderRadius:7,color:'#9a9788',padding:'5px 10px',cursor:'pointer',fontSize:16,flexShrink:0}}>‹</button>
          <h2 style={{fontFamily:'Fraunces,serif',fontSize:isMobile?16:22,fontWeight:600,flex:1,minWidth:0}}>{MONTHS[month]} {year}</h2>
          <button onClick={()=>nav(1)} style={{background:'none',border:'1px solid #1f1f24',borderRadius:7,color:'#9a9788',padding:'5px 10px',cursor:'pointer',fontSize:16,flexShrink:0}}>›</button>
          <button onClick={()=>update('ui',{...state.ui,calDate:today})} style={{background:'none',border:'1px solid #1f1f24',borderRadius:7,color:'#9a9788',padding:'5px 10px',cursor:'pointer',fontSize:isMobile?11:12,flexShrink:0}}>Today</button>
          <button onClick={requestNotifPerm}
            title={notifPerm!=='granted'?'Enable alerts':pushActive?'Background push active':'Alerts on (foreground only)'}
            style={{background:notifPerm==='granted'?(pushActive?'rgba(245,158,11,0.12)':'rgba(16,185,129,0.08)'):'none',
              border:`1px solid ${notifPerm==='granted'?(pushActive?'rgba(245,158,11,.45)':'rgba(16,185,129,.4)'):'#1f1f24'}`,
              borderRadius:7,color:notifPerm==='granted'?(pushActive?'#f59e0b':'#10b981'):'#3a3a44',
              padding:'5px 8px',cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',gap:4,transition:'all 120ms'}}>
            <svg style={{width:13,height:13}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            {notifPerm==='granted' && pushActive && <span style={{fontSize:9,fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase'}}>BG</span>}
          </button>
        </div>
        {pushToast && (
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',borderRadius:8,marginBottom:12,
            background:pushToast==='active'?'rgba(245,158,11,0.08)':'rgba(16,185,129,0.07)',
            border:`1px solid ${pushToast==='active'?'rgba(245,158,11,0.25)':'rgba(16,185,129,0.25)'}`,
            color:pushToast==='active'?'#f59e0b':'#10b981',fontSize:12,animation:'fadeIn 200ms ease'}}>
            <svg style={{width:13,height:13,flexShrink:0}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            {pushToast==='active'
              ? 'Background alerts active — you\'ll be notified even when the app is closed'
              : 'Alerts on (open app only) — connect sync to enable background alerts'}
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:isMobile?2:4,marginBottom:isMobile?3:6}}>
          {DAY_SHORT.map(d=><div key={d} style={{fontSize:isMobile?9:11,color:'#3a3a44',textAlign:'center',fontWeight:600,padding:'4px 0'}}>{isMobile?d[0]:d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:isMobile?2:4}}>
          {cells.map((d,i)=> d===null ? <div key={`e${i}`}/> : (
            <div key={d.toISOString()} className={`cal-cell${fmtKey(d)===today?' today':''}${fmtKey(d)===selDate?' sel':''}`}
              onClick={()=>update('ui',{...state.ui,calDate:fmtKey(d)})}>
              <div style={{fontSize:isMobile?10:12,fontWeight:fmtKey(d)===today?700:400,color:fmtKey(d)===today?'#818cf8':'#c9c6b8',marginBottom:2}}>{d.getDate()}</div>
              {meetingsOnDay(d).slice(0,3).map((m,idx)=>(
                <div key={m.id+idx} style={{display:'flex',alignItems:'center',gap:2,marginBottom:2}}>
                  <div style={{width:'60%',height:isMobile?3:4,borderRadius:3,background: m.recurrence&&m.recurrence!=='none' ? '#10b981' : '#818cf8'}}/>
                  {!isMobile&&m.recurrence&&m.recurrence!=='none'&&<span style={{fontSize:8,color:'#10b981'}}>↻</span>}
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>

      {/* resize handle — desktop only */}
      {!isMobile && (
        <div className="resize-handle"
          onMouseDown={e=>{
            const startX=e.clientX, startW=panelWidth;
            const onMove=mv=>setPanelWidth(Math.max(200,Math.min(520,startW-(mv.clientX-startX))));
            const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);document.body.style.cursor='';document.body.style.userSelect='';};
            document.body.style.cursor='col-resize';document.body.style.userSelect='none';
            document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);e.preventDefault();
          }}
        />
      )}

      {/* ── day panel ── */}
      <div style={{width:isMobile?'100%':panelWidth,borderLeft:isMobile?'none':'1px solid #1f1f24',borderTop:isMobile?'1px solid #1f1f24':'none',display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0,minHeight:isMobile?160:undefined}}>
        <div style={{padding:'20px 16px 12px',borderBottom:'1px solid #1f1f24',flexShrink:0}}>
          <div style={{fontFamily:'Fraunces,serif',fontSize:16,fontWeight:600,marginBottom:2}}>
            {selDate===today ? 'Today' : parseKey(selDate).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'})}
          </div>
          <button className="btn-primary" onClick={openModal} style={{fontSize:12,padding:'5px 12px',marginTop:10,width:'100%'}}>+ Add meeting</button>
        </div>
        <div style={{flex:1,overflow:'auto',padding:'12px'}} className="scrollbar">
          {/* ── unified day timeline ── */}
          {(()=>{
            const tItems=[];
            if(state.salah?.enabled&&state.salah?.lat!==null&&selSalahTimes){
              const pt=selSalahTimes;
              PRAYER_NAMES.filter(p=>state.salah.prayers?.[p]!==false).forEach(p=>{
                const t=pt[p];if(!t||t==='--:--')return;
                const [h,m]=t.split(':').map(Number);
                tItems.push({type:'prayer',key:`p-${p}`,mins:h*60+m,time:t,label:PRAYER_LABELS[p]});
              });
            }
            selDayMeetings.forEach(m=>{
              const [h,mi]=(m.time||'00:00').split(':').map(Number);
              tItems.push({type:'meeting',key:m.id,mins:h*60+mi,meeting:m});
            });
            tItems.sort((a,b)=>a.mins-b.mins);
            let nowMins=null;
            if(isToday){
              const d=new Date(nowTick);
              nowMins=d.getHours()*60+d.getMinutes();
              tItems.push({type:'now',key:'now',mins:nowMins});
              tItems.sort((a,b)=>a.mins-b.mins);
            }
            if(!tItems.length)return <div style={{color:'#3a3a44',fontSize:12,padding:'8px 4px'}}>Nothing scheduled.</div>;
            return (
              <div style={{position:'relative',paddingLeft:4}}>
                <div style={{position:'absolute',left:15,top:14,bottom:14,width:1,background:'#1f1f24',zIndex:0}}/>
                {tItems.map((item,idx)=>{
                  if(item.type==='now'){
                    const upcoming=tItems.slice(idx+1).find(x=>x.type!=='now');
                    let countdown=null;
                    if(upcoming){
                      const diff=upcoming.mins-item.mins;
                      const h=Math.floor(diff/60), mn=diff%60;
                      const label=upcoming.type==='prayer'?upcoming.label:upcoming.meeting.title;
                      countdown=`${h>0?h+'h ':''}${mn}m until ${label}`;
                    }
                    const nowLabel=new Date(nowTick).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
                    return(
                      <div key="now" style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,position:'relative'}}>
                        <div style={{width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,zIndex:1,position:'relative'}}>
                          <span style={{position:'absolute',width:14,height:14,borderRadius:'50%',background:'#f43f5e',animation:'ping 1.8s cubic-bezier(0,0,.2,1) infinite'}}/>
                          <span style={{width:9,height:9,borderRadius:'50%',background:'#f43f5e',position:'relative',boxShadow:'0 0 0 3px #131317'}}/>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                            <span style={{fontSize:11,fontWeight:700,color:'#f43f5e',fontFamily:'"JetBrains Mono",monospace'}}>{nowLabel}</span>
                            <span style={{fontSize:11.5,color:'#f43f5e',fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em'}}>Now</span>
                          </div>
                          <div style={{fontSize:11,color:countdown?'#9a9788':'#3a3a44',marginTop:1}}>
                            {countdown||'Nothing else scheduled today'}
                          </div>
                        </div>
                      </div>
                    );
                  }
                  if(item.type==='prayer')return(
                    <div key={item.key} style={{display:'flex',alignItems:'center',gap:10,marginBottom:9,position:'relative'}}>
                      <div style={{width:22,height:22,borderRadius:'50%',background:'rgba(245,158,11,0.14)',border:'1.5px solid rgba(245,158,11,0.42)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,zIndex:1}}>
                        <svg style={{width:9,height:9}} viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2.5" strokeLinecap="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:11,fontWeight:700,color:'#f59e0b',fontFamily:'"JetBrains Mono",monospace',minWidth:37}}>{item.time}</span>
                        <span style={{fontSize:12,color:'#c9b97a',fontWeight:600}}>{item.label}</span>
                      </div>
                    </div>
                  );
                  const m=item.meeting,recLabel=recurLabel(m),isDelConf=confirmDel===m.id;
                  return(
                    <div key={item.key} style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:12,position:'relative'}}>
                      <div style={{width:22,height:22,borderRadius:'50%',background:recLabel?'rgba(16,185,129,0.12)':'rgba(129,140,248,0.12)',border:`1.5px solid ${recLabel?'rgba(16,185,129,0.4)':'rgba(129,140,248,0.4)'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1,zIndex:1}}>
                        <div style={{width:6,height:6,borderRadius:'50%',background:recLabel?'#10b981':'#818cf8'}}/>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                          <div style={{minWidth:0,flex:1}}>
                            <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                              <span style={{fontSize:11,fontWeight:700,color:'#9a9788',fontFamily:'"JetBrains Mono",monospace'}}>{m.time}</span>
                              <span style={{fontSize:13,fontWeight:600,color:'#f4f3ee',wordBreak:'break-word'}}>{m.title}</span>
                            </div>
                            <div style={{fontSize:11,color:'#9a9788',marginTop:1}}>{m.duration} min{m.attendees?` · ${m.attendees}`:''}</div>
                            {recLabel&&<div style={{display:'flex',alignItems:'center',gap:4,marginTop:3}}><span style={{fontSize:10,color:'#10b981',fontWeight:700}}>↻</span><span style={{fontSize:11,color:'#10b981'}}>{recLabel}{m.recurrenceEnd?` · until ${m.recurrenceEnd}`:''}</span></div>}
                            {m.exceptionDate&&<div style={{fontSize:10,color:'#f59e0b',marginTop:2}}>Edited occurrence</div>}
                          </div>
                          <div style={{display:'flex',gap:4,marginLeft:8,flexShrink:0,alignItems:'center'}}>
                            <button onClick={()=>openEditMeeting(m)} title="Edit meeting"
                              style={{background:'none',border:'none',color:'#3a3a44',cursor:'pointer',padding:'2px',display:'flex',alignItems:'center',transition:'color 120ms'}}
                              onMouseEnter={e=>e.currentTarget.style.color='#818cf8'}
                              onMouseLeave={e=>e.currentTarget.style.color='#3a3a44'}>
                              <svg style={{width:13,height:13}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <button onClick={()=>handleDeleteClick(m)} title="Delete meeting"
                              style={{background:'none',border:'none',color:'#3a3a44',cursor:'pointer',padding:'2px',display:'flex',alignItems:'center',transition:'color 120ms'}}
                              onMouseEnter={e=>e.currentTarget.style.color='#f43f5e'}
                              onMouseLeave={e=>e.currentTarget.style.color='#3a3a44'}>
                              <svg style={{width:13,height:13}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                          </div>
                        </div>
                        {isDelConf&&(
                          <div style={{marginTop:8,padding:'8px 10px',background:'#0f0f13',borderRadius:7,border:'1px solid #2a2a31'}}>
                            <div style={{fontSize:11,color:'#9a9788',marginBottom:6}}>Delete recurring meeting:</div>
                            <div style={{display:'flex',gap:5}}>
                              <button onClick={()=>doDeleteOne(m)} style={{flex:1,background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:6,color:'#f59e0b',fontSize:11,padding:'5px 4px',cursor:'pointer',fontFamily:'Manrope,sans-serif',fontWeight:600}}>This occurrence</button>
                              <button onClick={()=>doDeleteAll(m)} style={{flex:1,background:'rgba(244,63,94,.1)',border:'1px solid rgba(244,63,94,.3)',borderRadius:6,color:'#f43f5e',fontSize:11,padding:'5px 4px',cursor:'pointer',fontFamily:'Manrope,sans-serif',fontWeight:600}}>All occurrences</button>
                              <button onClick={()=>setConfirmDel(null)} style={{background:'none',border:'1px solid #2a2a31',borderRadius:6,color:'#9a9788',fontSize:11,padding:'5px 8px',cursor:'pointer',fontFamily:'Manrope,sans-serif'}}>Cancel</button>
                            </div>
                          </div>
                        )}
                        <button onClick={()=>openMeetingNote(m)}
                          style={{marginTop:6,background:'none',border:'1px solid #2a2a31',borderRadius:6,color:'#818cf8',fontSize:11.5,padding:'4px 10px',cursor:'pointer',width:'100%'}}>
                          {m.noteId?'Open meeting note':'Create meeting note'}
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      </div>

      {/* ── add meeting modal ── */}
      {showModal&&(
        <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setShowModal(false)}}>
          <div className="modal fadeUp" style={{maxHeight:'90vh',overflowY:'auto'}}>
            <div style={{padding:'20px 24px',borderBottom:'1px solid #1f1f24',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#131317',zIndex:1}}>
              <span style={{fontFamily:'Fraunces,serif',fontSize:17,fontWeight:600}}>New meeting</span>
              <button onClick={()=>setShowModal(false)} style={{background:'none',border:'none',color:'#9a9788',cursor:'pointer',fontSize:20}}>×</button>
            </div>
            <form onSubmit={addMeeting} style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:16}}>

              {/* title */}
              <div>
                <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:5}}>Title</label>
                <input className="input" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Meeting title" autoFocus required/>
              </div>

              {/* time + duration */}
              <div style={{display:'flex',gap:12}}>
                <div style={{flex:1}}>
                  <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:5}}>Time</label>
                  <input type="time" className="input" value={form.time} onChange={e=>setForm({...form,time:e.target.value})}/>
                </div>
                <div style={{flex:1}}>
                  <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:5}}>Duration (min)</label>
                  <input type="number" className="input" value={form.duration} min={5} max={480} onChange={e=>setForm({...form,duration:+e.target.value})}/>
                </div>
              </div>

              {/* attendees */}
              <div>
                <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:5}}>Attendees</label>
                <input className="input" value={form.attendees} onChange={e=>setForm({...form,attendees:e.target.value})} placeholder="Names or emails"/>
              </div>

              {/* recurrence type */}
              <div>
                <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:8}}>Recurrence</label>
                <div style={{display:'flex',gap:6}}>
                  {['none','daily','weekly','monthly'].map(r=>(
                    <button type="button" key={r} onClick={()=>{
                      const days = r==='weekly' ? [parseKey(selDate).getDay()] : [];
                      setForm({...form, recurrence:r, recurrenceDays:days});
                    }} style={tog(form.recurrence===r)}>
                      {r==='none'?'None':r[0].toUpperCase()+r.slice(1)}
                    </button>
                  ))}
                </div>

                {/* weekly day picker */}
                {form.recurrence==='weekly' && (
                  <div style={{marginTop:10}}>
                    <div style={{fontSize:11,color:'#9a9788',marginBottom:6}}>Repeats on</div>
                    <div style={{display:'flex',gap:5}}>
                      {DAY_SHORT.map((day,i)=>{
                        const on = (form.recurrenceDays||[]).includes(i);
                        return (
                          <button type="button" key={i} onClick={()=>{
                            const days = on
                              ? form.recurrenceDays.filter(d=>d!==i)
                              : [...(form.recurrenceDays||[]),i];
                            setForm({...form,recurrenceDays:days});
                          }} style={{...tog(on),flex:1,padding:'5px 0',fontSize:11}}>
                            {day[0]}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* end date */}
                {form.recurrence!=='none' && (
                  <div style={{marginTop:12}}>
                    <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:5}}>
                      End date <span style={{color:'#3a3a44'}}>(optional)</span>
                    </label>
                    <input type="date" className="input" value={form.recurrenceEnd}
                      onChange={e=>setForm({...form,recurrenceEnd:e.target.value})}
                      min={selDate}/>
                  </div>
                )}
              </div>

              <div style={{display:'flex',gap:8,justifyContent:'flex-end',paddingTop:4}}>
                <button type="button" className="btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
                <button type="submit" className="btn-primary">Add meeting</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* ── edit meeting modal ── */}
      {editModal&&(
        <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget){setEditModal(null);setConfirmDel(null);}}}>
          <div className="modal fadeUp" style={{maxHeight:'90vh',overflowY:'auto'}}>
            <div style={{padding:'20px 24px',borderBottom:'1px solid #1f1f24',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#131317',zIndex:1}}>
              <span style={{fontFamily:'Fraunces,serif',fontSize:17,fontWeight:600}}>Edit meeting</span>
              <button onClick={()=>setEditModal(null)} style={{background:'none',border:'none',color:'#9a9788',cursor:'pointer',fontSize:20}}>×</button>
            </div>

            {/* scope selector for recurring meetings */}
            {editModal.recurrence && editModal.recurrence!=='none' && !editModal.exceptionDate && (
              <div style={{padding:'12px 24px',borderBottom:'1px solid #1f1f24',background:'#0f0f13'}}>
                <div style={{fontSize:11,color:'#9a9788',marginBottom:8}}>Recurring meeting — save changes for:</div>
                <div style={{display:'flex',gap:6}}>
                  {[['all','All occurrences'],['one','This occurrence only']].map(([v,l])=>(
                    <button type="button" key={v} onClick={()=>setEditScope(v)} style={tog(editScope===v)}>{l}</button>
                  ))}
                </div>
                {editScope==='one'&&<div style={{fontSize:10,color:'#9a9788',marginTop:6}}>Creates a separate entry for {selDate} only.</div>}
              </div>
            )}

            <form onSubmit={submitEditMeeting} style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:16}}>
              <div>
                <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:5}}>Title</label>
                <input className="input" value={editForm.title} onChange={e=>setEditForm({...editForm,title:e.target.value})} autoFocus required/>
              </div>
              <div style={{display:'flex',gap:12}}>
                <div style={{flex:1}}>
                  <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:5}}>Time</label>
                  <input type="time" className="input" value={editForm.time} onChange={e=>setEditForm({...editForm,time:e.target.value})}/>
                </div>
                <div style={{flex:1}}>
                  <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:5}}>Duration (min)</label>
                  <input type="number" className="input" value={editForm.duration} min={5} max={480} onChange={e=>setEditForm({...editForm,duration:+e.target.value})}/>
                </div>
              </div>
              <div>
                <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:5}}>Attendees</label>
                <input className="input" value={editForm.attendees} onChange={e=>setEditForm({...editForm,attendees:e.target.value})} placeholder="Names or emails"/>
              </div>
              {editScope==='all' && (
                <div>
                  <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:8}}>Recurrence</label>
                  <div style={{display:'flex',gap:6}}>
                    {['none','daily','weekly','monthly'].map(r=>(
                      <button type="button" key={r} onClick={()=>{
                        const days=r==='weekly'?(editForm.recurrenceDays.length?editForm.recurrenceDays:[parseKey(selDate).getDay()]):[];
                        setEditForm({...editForm,recurrence:r,recurrenceDays:days});
                      }} style={tog(editForm.recurrence===r)}>
                        {r==='none'?'None':r[0].toUpperCase()+r.slice(1)}
                      </button>
                    ))}
                  </div>
                  {editForm.recurrence==='weekly'&&(
                    <div style={{marginTop:10}}>
                      <div style={{fontSize:11,color:'#9a9788',marginBottom:6}}>Repeats on</div>
                      <div style={{display:'flex',gap:5}}>
                        {DAY_SHORT.map((day,i)=>{
                          const on=(editForm.recurrenceDays||[]).includes(i);
                          return <button type="button" key={i} onClick={()=>{const ds=on?editForm.recurrenceDays.filter(d=>d!==i):[...(editForm.recurrenceDays||[]),i];setEditForm({...editForm,recurrenceDays:ds});}} style={{...tog(on),flex:1,padding:'5px 0',fontSize:11}}>{day[0]}</button>;
                        })}
                      </div>
                    </div>
                  )}
                  {editForm.recurrence!=='none'&&(
                    <div style={{marginTop:12}}>
                      <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:5}}>End date <span style={{color:'#3a3a44'}}>(optional)</span></label>
                      <input type="date" className="input" value={editForm.recurrenceEnd} onChange={e=>setEditForm({...editForm,recurrenceEnd:e.target.value})}/>
                    </div>
                  )}
                </div>
              )}
              <div style={{display:'flex',gap:8,justifyContent:'flex-end',paddingTop:4}}>
                <button type="button" className="btn-ghost" onClick={()=>setEditModal(null)}>Cancel</button>
                <button type="submit" className="btn-primary">Save changes</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── SyncIconBtn ── */
function SyncIconBtn({ onClick, syncStatus }) {
  const dotColor =
    syncStatus==='synced'  ? '#10b981' :
    syncStatus==='saving'  ? '#f59e0b' :
    syncStatus==='syncing' ? '#818cf8' :
    syncStatus==='offline' ? '#f43f5e' :
    syncStatus==='unauth'  ? '#f59e0b' : null;
  const spinning = syncStatus==='syncing' || syncStatus==='saving';
  const label =
    syncStatus==='synced'  ? 'Synced — click to pull latest' :
    syncStatus==='syncing' ? 'Syncing…' :
    syncStatus==='saving'  ? 'Saving…' :
    syncStatus==='offline' ? 'Offline — click to retry' :
    syncStatus==='unauth'  ? 'Auth error — click to reconnect' : 'Set up sync';
  return (
    <button onClick={onClick} title={label}
      style={{background:'linear-gradient(135deg,#818cf8,#6366f1)',border:'none',borderRadius:7,cursor:'pointer',width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,position:'relative',boxShadow:'0 4px 10px rgba(99,102,241,.35)',transition:'box-shadow 120ms'}}
      onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 16px rgba(99,102,241,.6)'}
      onMouseLeave={e=>e.currentTarget.style.boxShadow='0 4px 10px rgba(99,102,241,.35)'}>
      <svg style={{width:13,height:13,animation:spinning?'spin 0.8s linear infinite':'none'}} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round">
        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
      </svg>
      {dotColor && <span style={{position:'absolute',top:-3,right:-3,width:8,height:8,borderRadius:99,background:dotColor,border:'2px solid #0d0d10'}}/>}
    </button>
  );
}

/* ── KanbanView ── */
const KANBAN_COLORS = ['#818cf8','#6366f1','#f59e0b','#f43f5e','#10b981','#3b82f6','#a855f7','#ec4899','#14b8a6','#6b7280'];
const PRIO_CLR = {high:'#f43f5e',medium:'#f59e0b',low:'#10b981',none:'#3a3a44'};

function KanbanNotePicker({ notes, onPick }) {
  const [q, setQ] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = e => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const matches = notes.filter(n => !q || n.title.toLowerCase().includes(q.toLowerCase())).slice(0, 8);
  return (
    <div ref={ref} style={{position:'relative'}}>
      <input value={q} onChange={e=>setQ(e.target.value)} onFocus={()=>setOpen(true)}
        placeholder="Search notes to link…"
        style={{width:'100%',background:'#17171b',border:'1px solid #2a2a31',borderRadius:6,color:'#c9c6b8',fontSize:12,padding:'5px 8px',outline:'none',fontFamily:'Manrope,sans-serif',boxSizing:'border-box'}}/>
      {open && matches.length > 0 && (
        <div style={{position:'absolute',top:'calc(100% + 3px)',left:0,right:0,background:'#17171b',border:'1px solid #2a2a31',borderRadius:8,zIndex:50,maxHeight:160,overflowY:'auto',boxShadow:'0 8px 24px rgba(0,0,0,.6)'}}>
          {matches.map(n => (
            <div key={n.id} onMouseDown={()=>{onPick(n.id);setQ('');setOpen(false);}}
              style={{display:'flex',alignItems:'center',gap:6,padding:'6px 8px',cursor:'pointer',transition:'background 80ms'}}
              onMouseEnter={e=>e.currentTarget.style.background='#2a2a31'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{fontSize:13}}>{n.emoji||'📝'}</span>
              <span style={{fontSize:12,color:'#c9c6b8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.title||'Untitled'}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function KanbanView({ state, update, isMobile }) {
  const cols = (state.kanbanCols && state.kanbanCols.length)
    ? state.kanbanCols
    : [{id:'todo',name:'To Do',color:'#818cf8'},{id:'inprogress',name:'In Progress',color:'#f59e0b'},{id:'blocked',name:'Blocked',color:'#f43f5e'},{id:'done',name:'Done',color:'#10b981'}];

  const [collapsedCols, setCollapsedCols] = useState(new Set());
  const [expandedCard, setExpandedCard]   = useState(null);
  const [addingCol,    setAddingCol]      = useState(false);
  const [newColName,   setNewColName]     = useState('');
  const [newColColor,  setNewColColor]    = useState('#818cf8');
  const [quickAdd,     setQuickAdd]       = useState({});
  const [renamingCol,  setRenamingCol]    = useState(null);
  const [renameColVal, setRenameColVal]   = useState('');

  /* ── drag state ── */
  const dragId   = useRef(null);        // task id being dragged
  const [draggingId,  setDraggingId]  = useState(null);  // for card opacity
  const [dragOverCol, setDragOverCol] = useState(null);  // column highlight

  const moveTask   = (id, colId) => update('tasks', state.tasks.map(t=>t.id===id?{...t,kanbanCol:colId}:t));
  const updateTask = (id, patch) => update('tasks', state.tasks.map(t=>t.id===id?{...t,...patch}:t));
  const deleteTask = id           => { update('tasks', state.tasks.filter(t=>t.id!==id)); if(expandedCard===id) setExpandedCard(null); };
  const addKanbanTag = (tid, tag) => {
    const c = tag.startsWith('#') ? tag : '#'+tag;
    const task = state.tasks.find(t=>t.id===tid);
    if (!task || (task.tags||[]).includes(c)) return;
    updateTask(tid, {tags:[...(task.tags||[]),c]});
    if (!state.tags.includes(c)) update('tags',[...state.tags,c]);
  };
  const addKanbanSub = (tid, title) => {
    if (!title.trim()) return;
    const task = state.tasks.find(t=>t.id===tid);
    if (!task) return;
    updateTask(tid, {subtasks:[...(task.subtasks||[]),{id:uid(),title:title.trim(),done:false}]});
  };

  const addKanbanTask = colId => {
    const title = (quickAdd[colId]||'').trim();
    if (!title) return;
    update('tasks', [{id:uid(),title,done:false,priority:'medium',due:'',subtasks:[],created:Date.now(),kanbanCol:colId},...state.tasks]);
    setQuickAdd({...quickAdd,[colId]:''});
  };

  const addCol = e => {
    e.preventDefault();
    if (!newColName.trim()) return;
    update('kanbanCols', [...cols,{id:uid(),name:newColName.trim(),color:newColColor}]);
    setNewColName(''); setAddingCol(false);
  };
  const deleteCol = id => {
    update('kanbanCols', cols.filter(c=>c.id!==id));
    update('tasks', state.tasks.map(t=>t.kanbanCol===id?{...t,kanbanCol:'todo'}:t));
  };
  const saveRenameCol = e => {
    e.preventDefault();
    if (!renameColVal.trim()) return;
    update('kanbanCols', cols.map(c=>c.id===renamingCol?{...c,name:renameColVal.trim()}:c));
    setRenamingCol(null);
  };
  const toggleCollapse = id => setCollapsedCols(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});

  /* ── drag helpers ── */
  const onCardDragStart = (e, taskId) => {
    dragId.current = taskId;
    setDraggingId(taskId);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', taskId);
  };
  const onCardDragEnd = () => {
    dragId.current = null;
    setDraggingId(null);
    setDragOverCol(null);
  };
  const onColDragOver = (e, colId) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (dragOverCol !== colId) setDragOverCol(colId);
  };
  const onColDragLeave = (e) => {
    if (!e.currentTarget.contains(e.relatedTarget)) setDragOverCol(null);
  };
  const onColDrop = (e, colId) => {
    e.preventDefault();
    const id = dragId.current || e.dataTransfer.getData('text/plain');
    if (id) { moveTask(id, colId); }
    dragId.current = null;
    setDraggingId(null);
    setDragOverCol(null);
  };

  /* grip icon */
  const Grip = () => (
    <div style={{display:'flex',flexDirection:'column',gap:2.5,padding:'2px 5px 2px 2px',flexShrink:0,opacity:.35,cursor:'grab'}}>
      {[0,1,2].map(i=>(
        <div key={i} style={{display:'flex',gap:2.5}}>
          <div style={{width:3,height:3,borderRadius:99,background:'#9a9788'}}/>
          <div style={{width:3,height:3,borderRadius:99,background:'#9a9788'}}/>
        </div>
      ))}
    </div>
  );

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:`${isMobile?16:28}px ${isMobile?14:32}px 12px`,flexShrink:0}}>
        <h1 style={{fontFamily:'Fraunces,serif',fontSize:isMobile?22:26,fontWeight:600,color:'#f4f3ee',margin:0}}>Kanban</h1>
      </div>

        {/* add section */}
        <div style={{flexShrink:0,width:220}}>

    </div>

/* ── InstallBanner ── */
function InstallBanner() {
  const [prompt, setPrompt] = useState(window._installPrompt || null);

  useEffect(() => {
    const onReady = () => setPrompt(window._installPrompt);
    const onDone  = () => setPrompt(null);
    window.addEventListener('installpromptready', onReady);
    window.addEventListener('appinstalled_done', onDone);
    return () => {
      window.removeEventListener('installpromptready', onReady);
      window.removeEventListener('appinstalled_done', onDone);
    };
  }, []);

  if (!prompt) return null;

  const install = async () => {
    prompt.prompt();
    const { outcome } = await prompt.userChoice;
    if (outcome === 'accepted') setPrompt(null);
  };

  return (
    <div style={{
      position:'fixed',top:0,left:0,right:0,zIndex:110,
      background:'#0d0d10',borderBottom:'1px solid #1f1f24',
      padding:'10px 16px',
      display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,
      boxShadow:'0 8px 32px rgba(0,0,0,.5)',
    }}>
      <div style={{display:'flex',alignItems:'center',gap:10,minWidth:0}}>
        <img src="/folio-icon.svg" alt="" style={{width:28,height:28,borderRadius:7,flexShrink:0}}/>
        <div style={{minWidth:0}}>
          <div style={{fontSize:12,fontWeight:600,color:'#f4f3ee'}}>Add to Home Screen</div>
          <div style={{fontSize:10,color:'#9a9788'}}>Install Folio for offline access</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        <button onClick={()=>setPrompt(null)} className="btn-ghost" style={{fontSize:10,padding:'5px 10px'}}>Not now</button>
        <button onClick={install} className="btn-primary" style={{fontSize:11,padding:'6px 14px'}}>Install</button>
      </div>
    </div>
  );
}

/* ── Sidebar ── */
function Sidebar({ state, update, syncStatus, onSetup, onSync, collapsed, onToggle, onSalah }) {
  const { view } = state.ui;
  const recent = [...state.notes].sort((a,b)=>b.updated-a.updated).slice(0,5);
  const folders = state.folders || [];
  const [addingFolder, setAddingFolder] = useState(false);
  const [newFolderName, setNewFolderName] = useState('');
  const [renamingId, setRenamingId] = useState(null);
  const [renameVal, setRenameVal] = useState('');
  const [hoveredFolder, setHoveredFolder] = useState(null);

  const nav = v => update('ui',{...state.ui,view:v,folderId:null,...(v==='calendar'?{calDate:todayKey()}:{})});
  const navFolder = fid => update('ui',{...state.ui,view:'notes',folderId:fid});

  const newNote = () => {
    const n={id:uid(),emoji:'📝',title:'',body:'',tags:[],links:[],images:[],folderId:state.ui.folderId||null,created:Date.now(),updated:Date.now()};
    update('notes',[n,...state.notes]);
    update('ui',{...state.ui,view:'notes',noteId:n.id});
  };

  const createFolder = e => {
    e.preventDefault();
    if (!newFolderName.trim()) return;
    update('folders',[...folders,{id:uid(),name:newFolderName.trim()}]);
    setNewFolderName(''); setAddingFolder(false);
  };
  const deleteFolder = fid => {
    update('folders', folders.filter(f=>f.id!==fid));
    update('notes', state.notes.map(n=>n.folderId===fid?{...n,folderId:null}:n));
    if (state.ui.folderId===fid) update('ui',{...state.ui,folderId:null});
  };
  const saveRename = e => {
    e.preventDefault();
    if (!renameVal.trim()) return;
    update('folders', folders.map(f=>f.id===renamingId?{...f,name:renameVal.trim()}:f));
    setRenamingId(null);
  };

  const navItems = [
    {id:'today',    label:'Today',    icon:Ic.today},
    {id:'notes',    label:'Notes',    icon:Ic.notes},
    {id:'tasks',    label:'Tasks',    icon:Ic.tasks},
    {id:'kanban',   label:'Kanban',   icon:Ic.kanban},
    {id:'calendar', label:'Calendar', icon:Ic.cal},
    {id:'tags',     label:'Tags',     icon:Ic.tags},
  ];

  const FolderIcon = ({open}) => (
    <svg style={{width:13,height:13,flexShrink:0}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">

/* ── MobileNav ── */
function MobileNav({ state, update, syncStatus, onSetup, onSync, onSalah }) {
  const { view } = state.ui;
  const nav = v => update('ui',{...state.ui,view:v,...(v==='calendar'?{calDate:todayKey()}:{})});
  const pending = state.tasks.filter(t=>!t.done&&t.due===todayKey()).length;
  const spinning = syncStatus==='syncing' || syncStatus==='saving';
  const dotColor =
    syncStatus==='synced'  ? '#10b981' :
    syncStatus==='saving'  ? '#f59e0b' :
    syncStatus==='syncing' ? '#818cf8' :
    syncStatus==='offline' ? '#f43f5e' :
    syncStatus==='unauth'  ? '#f59e0b' : null;
  const navBtnStyle = active => ({
    flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
    gap:2,background:'none',border:'none',cursor:'pointer',
    color:active?'#818cf8':'#3a3a44',
    fontSize:9,fontFamily:'Manrope,sans-serif',fontWeight:700,
    letterSpacing:'.04em',textTransform:'uppercase',
    transition:'color 110ms',position:'relative',padding:'6px 0',
  });
  return (
    <div className="mobile-nav">
      {[
        {id:'today',   label:'Today',  icon:Ic.today},
        {id:'notes',   label:'Notes',  icon:Ic.notes},
        {id:'tasks',   label:'Tasks',  icon:Ic.tasks},
        {id:'kanban',  label:'Kanban', icon:Ic.kanban},
        {id:'calendar',label:'Cal',    icon:Ic.cal},
      ].map(({id,label,icon})=>(
        <button key={id} onClick={()=>nav(id)} style={navBtnStyle(view===id)}>
          <span style={{width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center'}}>{icon}</span>
          {label}
          {id==='tasks'&&pending>0&&(
            <span style={{position:'absolute',top:4,right:'calc(50% - 16px)',background:'#818cf8',borderRadius:99,fontSize:8,fontWeight:700,color:'#fff',minWidth:14,height:14,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px'}}>

      <button onClick={onSalah} style={{...navBtnStyle(false),color:state.salah?.enabled?'#f59e0b':'#9a9788',background:state.salah?.enabled?'rgba(245,158,11,0.12)':'rgba(255,255,255,0.03)',borderTop:state.salah?.enabled?'2px solid rgba(245,158,11,0.5)':'2px solid transparent'}} title="Prayer times">
        <span style={{width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg style={{width:15,height:15}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/>
          </svg>
        </span>
        Salah
      </button>
      <button onClick={onSetup} style={navBtnStyle(false)} title="Sync">
        <span style={{width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
          <svg style={{width:15,height:15,animation:spinning?'spin 0.8s linear infinite':'none'}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
          </svg>
          {dotColor && <span style={{position:'absolute',top:-1,right:-1,width:6,height:6,borderRadius:99,background:dotColor,border:'1.5px solid #0d0d10'}}/>}

  );

/* ── SalahModal ── */
function SalahModal({ state, update, onClose }) {
  const s = state.salah || {};
  const [enabled,  setEnabled]  = useState(!!s.enabled);
  const [lat,      setLat]      = useState(s.lat !== null && s.lat !== undefined ? String(s.lat) : '');
  const [lng,      setLng]      = useState(s.lng !== null && s.lng !== undefined ? String(s.lng) : '');
  const [method,   setMethod]   = useState(s.method || 'mwl');
  const [asr,      setAsr]      = useState(s.asr || 'standard');
  const [prayers,  setPrayers]  = useState({fajr:true,sunrise:false,dhuhr:true,asr:true,maghrib:true,isha:true,...(s.prayers||{})});
  const [locMsg,   setLocMsg]   = useState('');
  const [preview,  setPreview]  = useState(null);

  const tz = -(new Date().getTimezoneOffset()/60);

  /* auto-preview whenever inputs change */
  useEffect(()=>{
    const la=parseFloat(lat), lo=parseFloat(lng);
    if (!isNaN(la) && !isNaN(lo)) {
      fetchAlAdhan(todayKey(),la,lo,method,asr).then(t=>setPreview(t));
    } else setPreview(null);
  },[lat,lng,method,asr]);

  const detectLocation = () => {
    if (!navigator.geolocation){setLocMsg('Geolocation not supported');return;}
    setLocMsg('Detecting location…');
    navigator.geolocation.getCurrentPosition(
      pos=>{setLat(pos.coords.latitude.toFixed(6));setLng(pos.coords.longitude.toFixed(6));setLocMsg('✓ Location detected');},
      err=>{setLocMsg('✗ '+err.message);},
      {timeout:10000}
    );
  };

  const save = () => {
    const la=parseFloat(lat), lo=parseFloat(lng);
    if (enabled && (isNaN(la)||isNaN(lo))){setLocMsg('✗ Enter valid latitude and longitude first');return;}
    update('salah',{enabled, lat:isNaN(la)?null:la, lng:isNaN(lo)?null:lo, method, asr, prayers});
    onClose();
  };

  const togBtn = active => ({
    flex:1, padding:'7px 8px', borderRadius:7, fontSize:12, fontWeight:600,
    cursor:'pointer', border:'1px solid', transition:'all 110ms',
    background:active?'#818cf8':'transparent',
    borderColor:active?'#818cf8':'#1f1f24',
    color:active?'#fff':'#9a9788',
  });

  return (
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal fadeUp" style={{maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{padding:'20px 24px',borderBottom:'1px solid #1f1f24',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#131317',zIndex:1}}>
          <div>
            <div style={{fontFamily:'Fraunces,serif',fontSize:17,fontWeight:600}}>Prayer Times</div>
            <div style={{fontSize:12,color:'#9a9788',marginTop:2}}>Automatic salah times in your calendar &amp; Today view</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#9a9788',cursor:'pointer',fontSize:20,lineHeight:1}}>×</button>
        </div>

        <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:18}}>

          {/* enable toggle */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
            <div>
              <div style={{fontSize:14,fontWeight:600,color:'#f4f3ee'}}>Show prayer times</div>
              <div style={{fontSize:11,color:'#9a9788',marginTop:2}}>Displays salah times in the calendar day panel and Today view</div>
            </div>
            <button type="button" onClick={()=>setEnabled(v=>!v)}
              style={{width:42,height:24,borderRadius:12,border:'none',cursor:'pointer',transition:'background 150ms',background:enabled?'#10b981':'#2a2a31',position:'relative',flexShrink:0}}>
              <span style={{position:'absolute',top:3,left:enabled?21:3,width:18,height:18,borderRadius:9,background:'#fff',transition:'left 150ms'}}/>
            </button>
          </div>

          {enabled && (<>
            {/* location */}
            <div>
              <label style={{fontSize:12,color:'#9a9788',display:'block',marginBottom:8}}>Location</label>

  React.useEffect(() => {

      if (!('Notification' in window) || Notification.permission !== 'granted') { setPushState('no-perm'); return; }
      if (!localStorage.getItem('folio_token')) { setPushState('no-token'); return; }
      if (!('serviceWorker' in navigator)) { setPushState('no-sub'); return; }
      try {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        setPushState(sub ? 'active' : 'no-sub');
      } catch { setPushState('no-sub'); }
    })();

  const save = async e => {
    e.preventDefault();
    const t = token.trim();

    try {

/* ── Pomodoro ─────────────────────────────────────────────────────────────── */

function beep(freq = 880, dur = 0.4) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.25, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}

/* ── background-capable pomodoro notification ──
   Scheduled the moment a phase starts (not fired live), so it reaches the
   user via the service worker's own timer or — if a push subscription
   exists — via real Web Push, both of which keep working when the tab is
   backgrounded or the app is fully closed. */
function buildPomNotif(pom, task) {
  const title = pom.mode === 'cap'
    ? "Time's up"
    : pom.phase === 'work' ? 'Focus session complete' : "Break's over";
  const body = pom.mode === 'cap'
    ? `Your ${Math.round(pom.workSecs / 60)}m cap on "${task?.title || 'task'}" has ended`
    : pom.phase === 'work'
      ? `Time for a ${Math.round(pom.breakSecs / 60)}m break — ${task?.title || 'your task'}`
      : `Back to focus on ${task?.title || 'your task'}`;
  return { id: 'pomodoro', title, body, fireAt: pom.endsAt, type: 'pomodoro' };
}

async function syncPomodoroPush(notification) {
  try {
    const token = localStorage.getItem('folio_token');
    if (!token || !('serviceWorker' in navigator)) return false;
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (!sub) return false;
    const res = await fetch('/api/push', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ subscription: sub.toJSON(), notification }),
    });
    return res.ok;
  } catch { return false; }
}

function schedulePomodoroNotification(notification) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  if (navigator.serviceWorker?.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'SCHEDULE_POMODORO', notification });
  }
  syncPomodoroPush(notification);
}

/* play/pause/resume/start-next share one transition so the task-row button
   and the floating widget never fall out of sync */
function pomPlayClick(pom, setPom, task) {
  if (pom.awaitingStart || pom.paused) {
    const endsAt = Date.now() + pom.remaining * 1000;
    const next = { ...pom, endsAt, paused: false, awaitingStart: false };
    setPom(next);
    schedulePomodoroNotification(buildPomNotif(next, task));
  } else {
    const remaining = Math.max(0, Math.round((pom.endsAt - Date.now()) / 1000));
    setPom({ ...pom, remaining, endsAt: null, paused: true });
    schedulePomodoroNotification(null);
  }
}

function pomStop(pom, setPom, tasks, update, task) {
  if (!pom.awaitingStart && pom.phase === 'work' && task) {
    const remaining = pom.paused ? pom.remaining : Math.max(0, Math.round((pom.endsAt - Date.now()) / 1000));
    const partial = pom.workSecs - remaining;
    if (partial > 30) update('tasks', tasks.map(t => t.id === task.id
      ? { ...t, timeSpent: (t.timeSpent || 0) + partial } : t));
  }
  schedulePomodoroNotification(null);
  setPom(null);
}

function pomSkip(pom, setPom, tasks, update, task) {
  if (pom.phase === 'work') {
    const remaining = pom.paused ? pom.remaining : Math.max(0, Math.round((pom.endsAt - Date.now()) / 1000));
    const partial = pom.workSecs - remaining;
    if (task && partial > 30) update('tasks', tasks.map(t => t.id === task.id
      ? { ...t, pomDone: (t.pomDone || 0) + 1, timeSpent: (t.timeSpent || 0) + partial } : t));
  }
  beep(880, 0.3);
  const nextPhase = pom.phase === 'work' ? 'break' : 'work';
  const nextSecs  = pom.phase === 'work' ? pom.breakSecs : pom.workSecs;
  const endsAt = Date.now() + nextSecs * 1000;
  const next = { ...pom, phase: nextPhase, remaining: nextSecs, endsAt, paused: false, awaitingStart: false,
    sessionsDone: pom.phase === 'work' ? pom.sessionsDone + 1 : pom.sessionsDone };
  setPom(next);
  schedulePomodoroNotification(buildPomNotif(next, task));
}

function PomodoroWidget({ pom, setPom, tasks, update, isMobile }) {
  const task = tasks.find(t => t.id === pom?.taskId);
  const [notifPerm, setNotifPerm] = useState(('Notification' in window) ? Notification.permission : 'denied');

  /* recompute remaining from the wall-clock endsAt — resilient to throttled
     background tabs; also resyncs the instant the tab regains focus */
  useEffect(() => {
    if (!pom || pom.paused || pom.awaitingStart || !pom.endsAt) return;
    const recompute = () => setPom(prev => {
      if (!prev || prev.paused || prev.awaitingStart || !prev.endsAt) return prev;
      const rem = Math.max(0, Math.round((prev.endsAt - Date.now()) / 1000));
      return rem === prev.remaining ? prev : { ...prev, remaining: rem };
    });
    const id = setInterval(recompute, 1000);
    document.addEventListener('visibilitychange', recompute);
    return () => { clearInterval(id); document.removeEventListener('visibilitychange', recompute); };
  }, [pom?.paused, pom?.awaitingStart, pom?.endsAt]);

  /* phase ends — don't auto-continue, just bank progress and wait for the user.
     The actual notification was already scheduled (in advance) when this phase
     started, so it fires on time even if this tab never wakes up again. */
  useEffect(() => {
    if (!pom || pom.paused || pom.awaitingStart || pom.remaining !== 0) return;
    if (pom.mode === 'cap') {
      beep(440, 0.8);
      setTimeout(() => beep(440, 0.8), 500);
      if (task) update('tasks', tasks.map(t => t.id === task.id
        ? { ...t, timeSpent: (t.timeSpent || 0) + pom.workSecs } : t));
      setPom(null);
      return;
    }
    const finishedWork = pom.phase === 'work';
    beep(finishedWork ? 880 : 660, finishedWork ? 0.4 : 0.3);
    if (finishedWork && task) {
      update('tasks', tasks.map(t => t.id === task.id
        ? { ...t, pomDone: (t.pomDone || 0) + 1, timeSpent: (t.timeSpent || 0) + pom.workSecs } : t));
    }
    const nextPhase = finishedWork ? 'break' : 'work';
    const nextSecs  = finishedWork ? pom.breakSecs : pom.workSecs;
    setPom(prev => prev ? {
      ...prev, phase: nextPhase, remaining: nextSecs, endsAt: null,
      paused: true, awaitingStart: true,
      sessionsDone: finishedWork ? prev.sessionsDone + 1 : prev.sessionsDone,
    } : prev);
  }, [pom?.remaining, pom?.paused, pom?.awaitingStart]);

  if (!pom) return null;

  const enableNotifs = async () => {
    if (!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    setNotifPerm(perm);
    if (perm === 'granted' && !pom.paused && !pom.awaitingStart && pom.endsAt) {
      schedulePomodoroNotification(buildPomNotif(pom, task));
    }
  };

  const fmt = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
  const isCap = pom.mode === 'cap';
  const isWork = pom.phase === 'work';
  const total = isWork ? pom.workSecs : pom.breakSecs;
  const progress = total > 0 ? (total - pom.remaining) / total : 0;
  const accent = isCap ? '#f59e0b' : (pom.awaitingStart ? '#f59e0b' : (isWork ? '#818cf8' : '#10b981'));

  const partialSecs = isWork && !pom.awaitingStart ? (pom.workSecs - pom.remaining) : 0;
  const totalSpentSecs = (task?.timeSpent || 0) + partialSecs;
  const totalSpentMins = totalSpentSecs / 60;
  const hasTimeBlock = !!task?.timeBlock && !isCap;
  const capRatio = hasTimeBlock ? Math.min(1, totalSpentMins / task.timeBlock) : 0;
  const overCap = hasTimeBlock && totalSpentMins >= task.timeBlock;

  const r = 26, circ = 2 * Math.PI * r;
  const dots = Math.min(pom.sessionsDone, 8);
  const badgeLabel = isCap ? 'Time Cap'
    : pom.awaitingStart ? (isWork ? 'Break ready' : 'Focus ready')
    : (isWork ? 'Focus' : 'Break');

  return (
    <div style={{position:'fixed',bottom:isMobile?72:24,right:16,
      background:'#131317',border:`1px solid ${accent}30`,borderRadius:16,
      padding:'14px 16px',width:220,
      boxShadow:`0 8px 32px rgba(0,0,0,.6),0 0 0 1px ${accent}18`,
      zIndex:9000,fontFamily:'Manrope,sans-serif',userSelect:'none'}}>

      {/* header row */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',
          color:accent,background:`${accent}18`,padding:'2px 8px',borderRadius:99}}>
          {badgeLabel}
        </span>
        <div style={{display:'flex',alignItems:'center',gap:3}}>
          {Array.from({length:dots},(_,i)=>(
            <span key={i} style={{width:5,height:5,borderRadius:99,background:'#818cf8'}}/>
          ))}
          <button onClick={()=>pomStop(pom,setPom,tasks,update,task)} style={{background:'none',border:'none',color:'#3a3a44',
            cursor:'pointer',padding:'2px',lineHeight:1,marginLeft:6}}
            onMouseEnter={e=>e.currentTarget.style.color='#f43f5e'}
            onMouseLeave={e=>e.currentTarget.style.color='#3a3a44'} title="End session">
            <svg style={{width:12,height:12}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      {/* task name */}
      <div style={{fontSize:12,color:'#f4f3ee',fontWeight:600,marginBottom:12,
        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={task?.title}>
        {task?.title ?? '—'}
      </div>

      {/* progress ring */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r={r} fill="none" stroke="#1f1f24" strokeWidth="5"/>
          <circle cx="32" cy="32" r={r} fill="none" stroke={accent} strokeWidth="5"
            strokeDasharray={circ} strokeDashoffset={circ*(1-progress)}
            strokeLinecap="round" transform="rotate(-90 32 32)"
            style={{transition:'stroke-dashoffset .9s linear'}}/>
          <text x="32" y="37" textAnchor="middle" fill="#f4f3ee" fontSize="13"
            fontFamily="Manrope,sans-serif" fontWeight="700">{fmt(pom.remaining)}</text>
        </svg>
      </div>

      {/* controls */}
      {pom.awaitingStart ? (
        <button onClick={()=>pomPlayClick(pom,setPom,task)}
          style={{width:'100%',background:`${accent}15`,border:`1px solid ${accent}35`,
            borderRadius:8,color:accent,fontSize:12,padding:'8px 0',marginBottom:hasTimeBlock?12:0,
            cursor:'pointer',fontFamily:'Manrope,sans-serif',fontWeight:700}}>
          ▶ Start {isWork ? 'focus' : 'break'}
        </button>
      ) : (
        <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:hasTimeBlock?12:0}}>
          <button onClick={()=>pomPlayClick(pom,setPom,task)}
            style={{flex:1,background:`${accent}15`,border:`1px solid ${accent}35`,
              borderRadius:8,color:accent,fontSize:12,padding:'7px 0',
              cursor:'pointer',fontFamily:'Manrope,sans-serif',fontWeight:600}}>
            {pom.paused?'▶ Resume':'⏸ Pause'}
          </button>
          {!isCap&&(
            <button onClick={()=>pomSkip(pom,setPom,tasks,update,task)}
              style={{background:'#17171b',border:'1px solid #2a2a31',borderRadius:8,
                color:'#9a9788',fontSize:12,padding:'7px 10px',cursor:'pointer',
                fontFamily:'Manrope,sans-serif'}} title={isWork?'Skip to break':'Skip to focus'}>
              ⏭
            </button>
          )}
        </div>
      )}

      {/* time cap bar */}
      {hasTimeBlock&&(
        <div style={{marginBottom:notifPerm==='default'?10:0}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,
            marginBottom:3,color:overCap?'#f43f5e':'#9a9788'}}>
            <span>Time cap</span>
            <span>{Math.round(totalSpentMins)}m / {task.timeBlock}m{overCap&&' ⚠'}</span>
          </div>
          <div style={{height:3,borderRadius:99,background:'#1f1f24',overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:99,
              width:`${Math.round(capRatio*100)}%`,
              background:overCap?'#f43f5e':capRatio>0.8?'#f59e0b':'#10b981',
              transition:'width 1s linear'}}/>
          </div>
        </div>
      )}

      {/* background-notification permission hint */}
      {notifPerm==='default'&&(
        <button onClick={enableNotifs}
          style={{width:'100%',background:'none',border:'1px dashed #2a2a31',borderRadius:7,
            color:'#9a9788',fontSize:10.5,padding:'6px 0',cursor:'pointer',fontFamily:'Manrope,sans-serif'}}>
          🔔 Enable alerts for background notifications
        </button>
      )}
    </div>
  );
}

/* ── App ── */
function App() {
  const [state, setStateRaw]   = useState(null);
  const [syncStatus, setSyncStatus] = useState('idle'); /* idle|saving|synced|offline|unauth|local */
  const [setupOpen, setSetupOpen]   = useState(false);
  const [salahOpen, setSalahOpen]   = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
  const saveTimer    = useRef(null);
  const pendingFlush = useRef(null); /* latest unsaved state, cleared on successful D1 write */
  const stateRef     = useRef(null); /* always-current state for syncNow closure */
  const syncingRef   = useRef(false);
  const lastSyncRef  = useRef(0);
  stateRef.current = state;
  const [installBanner, setInstallBanner] = useState(!!window._installPrompt);
  const [pom, setPom] = useState(null);

  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);

  useEffect(() => {
    const onReady = () => setInstallBanner(true);
    const onDone  = () => setInstallBanner(false);
    window.addEventListener('installpromptready', onReady);
    window.addEventListener('appinstalled_done', onDone);
    return () => {
      window.removeEventListener('installpromptready', onReady);
      window.removeEventListener('appinstalled_done', onDone);
    };
  }, []);

  useEffect(() => {
    document.body.classList.toggle('pwa-install-banner', installBanner);
    return () => document.body.classList.remove('pwa-install-banner');
  }, [installBanner]);

  /* Respect ?view= from manifest shortcuts */
  const VALID_VIEWS = ['today','notes','tasks','kanban','calendar','tags'];
  const urlView = new URLSearchParams(location.search).get('view');
  const startView = VALID_VIEWS.includes(urlView) ? urlView : null;

  /* Merge new SEED keys in when DB shape evolves */
  const hydrate = d => {
    const merged = { ...SEED(), ...d, ui:{ ...SEED().ui, ...(d?.ui||{}) } };
    if (startView) merged.ui = { ...merged.ui, view: startView };
    return merged;
  };

  /* ── initial load ── */
  useEffect(() => { (async () => {
    const cache = Cache.read();
    if (!Sync.configured()) {
      setStateRaw(cache?.notes ? hydrate(cache) : SEED());
      setSyncStatus('local');
      return;
    }
    try {
      const remote = await Sync.load();
      const remoteEmpty  = !remote?.notes || remote.notes.length === 0;
      const cacheHasData = cache?.notes?.length > 0;
      if (remoteEmpty && cacheHasData) {
        await Sync.save(cache);
        setStateRaw(hydrate(cache));
      } else if (remoteEmpty) {
        const seed = SEED();
        await Sync.save(seed);
        setStateRaw(seed);
      } else {
        // Remote wins for conflicts, but preserve local-only items not yet synced to D1
        const merged = hydrate(remote);
        let hasExtras = false;
        ['notes','tasks','meetings','folders'].forEach(key => {
          const remoteIds = new Set((remote[key]||[]).map(x => x.id));
          const extras = (cache?.[key]||[]).filter(x => !remoteIds.has(x.id));
          if (extras.length) { merged[key] = [...merged[key], ...extras]; hasExtras = true; }
        });
        if (hasExtras) Sync.save(merged).catch(() => {});
        setStateRaw(merged);
      }
      setSyncStatus('synced');
    } catch(e) {
      if (e.message === 'UNAUTHORIZED') {
        Sync.setToken(null);
        setStateRaw(cache?.notes ? hydrate(cache) : SEED());
        setSyncStatus('unauth');
        setSetupOpen(true);
      } else {
        setStateRaw(cache?.notes ? hydrate(cache) : SEED());
        setSyncStatus('offline');
      }
    }
  })(); }, []);

  /* ── reload state from server after token is saved in SetupModal ── */
  const handleSyncConnected = useCallback(async (remote) => {
    const cache = Cache.read();
    const remoteEmpty = !remote?.notes || remote.notes.length === 0;
    const cacheHasData = cache?.notes?.length > 0;
    if (remoteEmpty && cacheHasData) {
      await Sync.save(cache);
      setStateRaw(hydrate(cache));
    } else if (!remoteEmpty) {
      const merged = hydrate(remote);
      let hasExtras = false;
      ['notes','tasks','meetings','folders'].forEach(key => {
        const remoteIds = new Set((remote[key]||[]).map(x => x.id));
        const extras = (cache?.[key]||[]).filter(x => !remoteIds.has(x.id));
        if (extras.length) { merged[key] = [...merged[key], ...extras]; hasExtras = true; }
      });
      if (hasExtras) await Sync.save(merged);
      setStateRaw(merged);
    }
    setSyncStatus('synced');
  }, []);

  /* ── reschedule notifications whenever meetings or salah settings change ── */
  useEffect(() => {
    if (state?.meetings) scheduleNotifications(state.meetings, state?.salah);
  }, [state?.meetings, state?.salah]);

  /* ── adhan: play audio when SW messages PLAY_ADHAN (app in foreground) ── */
  useEffect(() => {
    if (!('serviceWorker' in navigator)) return;
    const handler = e => {
      if (e.data?.type !== 'PLAY_ADHAN') return;
      try {
        const ac = new AudioContext();
        [[440, 0], [554, 0.45], [659, 0.9], [554, 1.35], [440, 1.8]].forEach(([freq, t]) => {
          const osc = ac.createOscillator(); const g = ac.createGain();
          osc.connect(g); g.connect(ac.destination);
          osc.frequency.value = freq; osc.type = 'sine';
          g.gain.setValueAtTime(0, ac.currentTime + t);
          g.gain.linearRampToValueAtTime(0.28, ac.currentTime + t + 0.08);
          g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.9);
          osc.start(ac.currentTime + t); osc.stop(ac.currentTime + t + 0.9);
        });
      } catch {}
    };
    navigator.serviceWorker.addEventListener('message', handler);
    return () => navigator.serviceWorker.removeEventListener('message', handler);
  }, []);

  /* ── reschedule notifications when app comes back to foreground ── */
  useEffect(() => {
    if (!state?.meetings) return;
    const { meetings, salah } = state;
    const onVisible = () => { if (document.visibilityState === 'visible') scheduleNotifications(meetings, salah); };
    document.addEventListener('visibilitychange', onVisible);
    return () => document.removeEventListener('visibilitychange', onVisible);
  }, [state?.meetings, state?.salah]);

  /* ── flush pending D1 write before the page is hidden/unloaded ── */
  useEffect(() => {
    const flush = () => {
      if (!pendingFlush.current) return;
      clearTimeout(saveTimer.current);
      Sync.save(pendingFlush.current).catch(() => {});
      pendingFlush.current = null;
    };
    const onVisibility = () => { if (document.visibilityState === 'hidden') flush(); };
    document.addEventListener('visibilitychange', onVisibility);
    window.addEventListener('pagehide', flush);
    return () => {
      document.removeEventListener('visibilitychange', onVisibility);
      window.removeEventListener('pagehide', flush);
    };
  }, []);

  /* ── manual / auto sync-now: pull remote, merge local extras, push if needed ── */
  const syncNow = useCallback(async () => {
    if (!Sync.configured()) { setSetupOpen(true); return; }
    if (syncingRef.current) return;
    syncingRef.current = true;
    clearTimeout(saveTimer.current);
    pendingFlush.current = null;
    setSyncStatus('syncing');
    try {
      const remote = await Sync.load();
      const current = stateRef.current;
      const merged = hydrate(remote || {});
      let hasExtras = false;
      ['notes','tasks','meetings','folders'].forEach(key => {
        const remoteIds = new Set(((remote||{})[key]||[]).map(x => x.id));
        const extras = (current?.[key]||[]).filter(x => !remoteIds.has(x.id));
        if (extras.length) { merged[key] = [...merged[key], ...extras]; hasExtras = true; }
      });
      if (hasExtras) await Sync.save(merged);
      Cache.write(merged);
      setStateRaw(merged);
      lastSyncRef.current = Date.now();
      setSyncStatus('synced');
    } catch(e) {
      setSyncStatus(e.message === 'UNAUTHORIZED' ? 'unauth' : 'offline');
    } finally {
      syncingRef.current = false;
    }
  }, []);

  /* ── auto-pull when app comes to foreground (critical for iPad PWA) ── */
  useEffect(() => {
    const onVisible = () => {
      if (document.visibilityState !== 'visible') return;
      if (!Sync.configured()) return;
      if (Date.now() - lastSyncRef.current < 30000) return; /* throttle: 30s minimum */
      syncNow();
    };
    document.addEventListener('visibilitychange', onVisible);
    window.addEventListener('focus', onVisible);
    return () => {
      document.removeEventListener('visibilitychange', onVisible);
      window.removeEventListener('focus', onVisible);
    };
  }, [syncNow]);

  /* ── update: write localStorage immediately, debounce D1 by 1.5s ── */
  const update = useCallback((key, val) => {
    setStateRaw(prev => {
      const next = typeof val === 'function'
        ? { ...prev, [key]: val(prev[key]) }
        : { ...prev, [key]: val };
      Cache.write(next);
      if (Sync.configured()) {
        pendingFlush.current = next;
        setSyncStatus('saving');
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(async () => {
          try {
            await Sync.save(next);
            pendingFlush.current = null;
            setSyncStatus('synced');
          } catch(e) {
            setSyncStatus(e.message === 'UNAUTHORIZED' ? 'unauth' : 'offline');
          }
        }, 1500);
      }
      return next;
    });
  }, []);

  if (!state) return (
    <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10,color:'#3a3a44'}}>
      <div style={{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,#818cf8,#6366f1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <span style={{fontSize:13,fontFamily:'Manrope,sans-serif'}}>Loading Folio…</span>
    </div>
  );

  const views = { today:TodayView, notes:NotesView, tasks:TasksView, kanban:KanbanView, calendar:CalendarView, tags:TagsView };
  const View  = views[state.ui.view] || TodayView;

  return (
    <>
      <Sidebar state={state} update={update} syncStatus={syncStatus} onSetup={()=>setSetupOpen(true)}
        onSync={syncNow} collapsed={!sidebarOpen} onToggle={()=>setSidebarOpen(v=>!v)} onSalah={()=>setSalahOpen(true)}/>
      <div className="main">
        <View state={state} update={update} isMobile={isMobile} pom={pom} setPom={setPom}/>
      </div>
      <MobileNav state={state} update={update} syncStatus={syncStatus} onSetup={()=>setSetupOpen(true)} onSync={syncNow} onSalah={()=>setSalahOpen(true)}/>
      {setupOpen && <SetupModal onClose={()=>setSetupOpen(false)} onConnected={handleSyncConnected} onSync={syncNow} syncStatus={syncStatus}/>}
      {salahOpen && <SalahModal state={state} update={update} onClose={()=>setSalahOpen(false)}/>}
      {installBanner && <InstallBanner/>}
      <PomodoroWidget pom={pom} setPom={setPom} tasks={state.tasks} update={update} isMobile={isMobile}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js').catch(function(err) {
        console.warn('SW registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
